<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات المطور - Abdallah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #ff4d4d;
            --dark: #0a0e27;
            --darker: #050812;
            --text: #ffffff;
            --border: #1a1f3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--darker); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        
        .admin-layout { display: flex; height: 100vh; }
        .admin-sidebar { width: 260px; background: var(--dark); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-menu { flex: 1; padding: 15px; }
        .menu-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; transition: 0.3s; }
        .menu-item:hover, .menu-item.active { background: rgba(0, 255, 136, 0.1); color: var(--primary); }
        
        .admin-main { flex: 1; overflow-y: auto; padding: 25px; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        
        .card { background: var(--dark); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: var(--primary); color: var(--dark); }
        .btn-full { width: 100%; margin-top: 10px; }
        
        /* مظهر التخطيط الجديد */
        .layout-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .layout-card { border: 2px solid var(--border); border-radius: 10px; padding: 15px; cursor: pointer; text-align: center; transition: 0.3s; }
        .layout-card:hover, .layout-card.active { border-color: var(--primary); background: rgba(0, 255, 136, 0.05); }
        .layout-img { width: 100%; border-radius: 5px; margin-bottom: 10px; }

        /* أداة البناء المخصص */
        .builder-container { border: 2px dashed var(--border); height: 400px; position: relative; border-radius: 12px; margin-top: 20px; overflow: hidden; background: rgba(0,0,0,0.2); }
        .draggable-element { position: absolute; padding: 10px; background: var(--primary); color: var(--dark); border-radius: 5px; cursor: move; }
    </style>
</head>
<body>
    <div id="notifications-container" style="position:fixed; top:20px; right:20px; z-index:9999;"></div>

    <div id="admin-panel" class="admin-layout">
        <div class="admin-sidebar">
            <div style="padding: 20px; font-size: 20px; color: var(--primary); font-weight: bold; border-bottom: 1px solid var(--border);">VibeForge Admin</div>
            <div class="sidebar-menu">
                <div class="menu-item active" onclick="switchSection('video-section', this)"><i class="fas fa-video"></i> الفيديوهات</div>
                <div class="menu-item" onclick="switchSection('profile-section', this)"><i class="fas fa-user"></i> البروفايل</div>
                <div class="menu-item" onclick="switchSection('layout-section', this)"><i class="fas fa-palette"></i> المظهر الجديد</div>
                <div class="menu-item" onclick="switchSection('builder-section', this)"><i class="fas fa-hammer"></i> صنع شكل مخصص</div>
                <div class="menu-item" onclick="switchSection('preview-section', this)"><i class="fas fa-eye"></i> المعاينة</div>
            </div>
        </div>

        <div class="admin-main">
            <!-- الفيديوهات -->
            <div id="video-section" class="admin-section active">
                <div class="card">
                    <h3>إدارة الفيديوهات</h3>
                    <input type="file" id="video-file" class="btn-full">
                    <button onclick="uploadMedia('video')" class="btn btn-full">رفع فيديو</button>
                </div>
            </div>

            <!-- المظهر الجديد -->
            <div id="layout-section" class="admin-section">
                <div class="card">
                    <h3>اختر مظهر العرض</h3>
                    <div class="layout-grid">
                        <div class="layout-card active" onclick="updateLayout('organic')">
                            <i class="fas fa-shapes fa-2x"></i>
                            <p>عضوي هندسي</p>
                        </div>
                        <div class="layout-card" onclick="updateLayout('rounded')">
                            <i class="fas fa-square fa-2x"></i>
                            <p>مربع مستدير</p>
                        </div>
                        <div class="layout-card" onclick="updateLayout('card')">
                            <i class="fas fa-id-card fa-2x"></i>
                            <p>نمط البطاقة</p>
                        </div>
                        <div class="layout-card" onclick="updateLayout('vertical')">
                            <i class="fas fa-columns fa-2x"></i>
                            <p>تخطيط عمودي</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- صنع شكل مخصص -->
            <div id="builder-section" class="admin-section">
                <div class="card">
                    <h3>صنع شكل مخصص (سحب وإفلات)</h3>
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <button class="btn" onclick="addCustomElement('text')">+ نص</button>
                        <button class="btn" onclick="addCustomElement('box')">+ مربع</button>
                        <button class="btn" onclick="addCustomElement('image')">+ صورة</button>
                    </div>
                    <div id="custom-builder-area" class="builder-container">
                        <!-- العناصر تظهر هنا -->
                    </div>
                    <button class="btn btn-full" onclick="saveCustomization()">حفظ التصميم</button>
                </div>
            </div>

            <!-- البروفايل -->
            <div id="profile-section" class="admin-section">
                <div class="card">
                    <h3>معلومات البروفايل</h3>
                    <input type="text" id="admin-name" placeholder="الاسم" class="btn-full" style="background:var(--darker); border:1px solid var(--border); color:white; padding:10px;">
                    <input type="text" id="admin-bio" placeholder="السيرة الذاتية" class="btn-full" style="background:var(--darker); border:1px solid var(--border); color:white; padding:10px; margin-top:10px;">
                    <button onclick="saveProfileData()" class="btn btn-full">حفظ البيانات</button>
                </div>
            </div>

            <!-- المعاينة -->
            <div id="preview-section" class="admin-section">
                <div class="card">
                    <h3>معاينة الموقع</h3>
                    <iframe src="index.html" style="width:100%; height:500px; border:none; border-radius:10px;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="login-system.js"></script>
    <script src="admin.js"></script>
</body>
</html>
