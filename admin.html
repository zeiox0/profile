<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">

    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:100; display:flex; justify-content:center; align-items:center;">
        <div class="admin-card">
            <h2 style="text-align:center; margin-bottom:20px;">تسجيل الدخول للإدارة</h2>
            <input type="email" id="email" class="admin-input" placeholder="البريد الإلكتروني">
            <input type="password" id="password" class="admin-input" placeholder="كلمة المرور">
            <button onclick="attemptLogin()" class="admin-btn">دخول</button>
            <p id="error-msg" style="color:red; display:none; margin-top:10px;"></p>
        </div>
    </div>

    <h1 style="text-align:center; margin-bottom:30px;">لوحة تحكم الموقع</h1>

    <div class="admin-card">
        <h2><i class="fas fa-user"></i> البيانات الشخصية</h2>
        <input type="text" id="admin-name" class="admin-input" placeholder="الاسم (مثال: zeiox)">
        <input type="text" id="admin-bio" class="admin-input" placeholder="الوصف (Bio)">
        <button onclick="saveData()" class="admin-btn">حفظ البيانات</button>
    </div>

    <div class="admin-card">
        <h2><i class="fas fa-video"></i> خلفية الفيديو</h2>
        <input type="text" id="video-link" class="admin-input" placeholder="ضع رابط مباشر للفيديو هنا">
        <div class="divider">--- أو ارفع ملف من جهازك ---</div>
        <input type="file" id="video-file" class="admin-input" accept="video/*">
        <button onclick="handleMediaAction('video')" class="admin-btn">تحديث الفيديو</button>
        <p id="video-status" style="margin-top:10px; color:#00ff00;"></p>
    </div>

    <div class="admin-card">
        <h2><i class="fas fa-music"></i> خلفية الصوت</h2>
        <input type="text" id="audio-link" class="admin-input" placeholder="ضع رابط مباشر للصوت هنا">
        <div class="divider">--- أو ارفع ملف من جهازك ---</div>
        <input type="file" id="audio-file" class="admin-input" accept="audio/*">
        <button onclick="handleMediaAction('audio')" class="admin-btn">تحديث الصوت</button>
        <p id="audio-status" style="margin-top:10px; color:#00ff00;"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    
    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
