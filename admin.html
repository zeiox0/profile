<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعدادات المطور - Abdallah</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #ff4d4d;
            --dark: #0a0e27;
            --darker: #050812;
            --text: #ffffff;
            --border: #1a1f3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--darker); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        
        /* ========== شاشة الدخول ========== */
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }
        
        .login-container {
            background: var(--dark);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0, 255, 136, 0.1);
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #aaa;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-weight: bold;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            transition: 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--primary);
        }
        
        .password-wrapper input {
            padding-left: 40px;
        }
        
        /* ========== CAPTCHA ========== */
        .captcha-section {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .captcha-label {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
        }
        
        .captcha-puzzle {
            background: var(--darker);
            border: 2px dashed var(--primary);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 5px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
            user-select: none;
        }
        
        .captcha-input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            text-align: center;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        /* ========== الأزرار ========== */
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: var(--dark);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 255, 136, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        /* ========== رسائل الخطأ ========== */
        #error-msg {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid var(--secondary);
            color: var(--secondary);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        /* ========== لوحة التحكم ========== */
        #admin-panel {
            display: none;
            flex-direction: row;
            height: 100vh;
        }
        
        .admin-layout { display: flex; height: 100vh; }
        .admin-sidebar { width: 260px; background: var(--dark); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; font-size: 20px; color: var(--primary); font-weight: bold; border-bottom: 1px solid var(--border); }
        .sidebar-menu { flex: 1; padding: 15px; overflow-y: auto; }
        .menu-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; transition: 0.3s; }
        .menu-item:hover, .menu-item.active { background: rgba(0, 255, 136, 0.1); color: var(--primary); }
        
        .logout-btn {
            padding: 12px 15px;
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid var(--secondary);
            color: var(--secondary);
            border-radius: 8px;
            cursor: pointer;
            margin: 15px;
            font-weight: bold;
        }
        
        .logout-btn:hover {
            background: rgba(255, 77, 77, 0.2);
        }
        
        .admin-main { flex: 1; overflow-y: auto; padding: 25px; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        
        .card { background: var(--dark); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .card h3 { color: var(--primary); margin-bottom: 15px; }
        
        /* مظهر التخطيط الجديد */
        .layout-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
        .layout-card { border: 2px solid var(--border); border-radius: 10px; padding: 15px; cursor: pointer; text-align: center; transition: 0.3s; }
        .layout-card:hover, .layout-card.active { border-color: var(--primary); background: rgba(0, 255, 136, 0.05); }
        
        /* أداة البناء المخصص */
        .builder-container { border: 2px dashed var(--border); height: 400px; position: relative; border-radius: 12px; margin-top: 20px; overflow: hidden; background: rgba(0,0,0,0.2); }
        .draggable-element { position: absolute; padding: 10px; background: var(--primary); color: var(--dark); border-radius: 5px; cursor: move; }
        
        /* الإشعارات */
        #notifications-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9998;
        }
        
        .notification {
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            min-width: 300px;
            animation: slideIn 0.3s ease;
        }
        
        .notification.success { border-color: var(--primary); }
        .notification.error { border-color: var(--secondary); }
        
        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="notifications-container"></div>

    <!-- شاشة الدخول -->
    <div id="login-overlay">
        <div class="login-container">
            <div class="login-header">
                <h1>🔐 VibeForge Admin</h1>
                <p>لوحة التحكم الآمنة للمطور</p>
            </div>
            
            <div id="error-msg"></div>
            
            <div class="form-group">
                <label>البريد الإلكتروني:</label>
                <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني">
            </div>
            
            <div class="form-group">
                <label>كلمة المرور:</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="أدخل كلمة المرور">
                    <span class="toggle-password" onclick="togglePasswordVisibility()">
                        <i class="fas fa-eye"></i>
                    </span>
                </div>
            </div>
            
            <div class="captcha-section">
                <label class="captcha-label">تحقق من الرمز:</label>
                <div class="captcha-puzzle" id="captcha-puzzle">XXXXX</div>
                <input type="text" id="captcha-answer" class="captcha-input" placeholder="أدخل الرمز أعلاه" maxlength="5">
            </div>
            
            <button class="btn" onclick="attemptLogin()">
                <i class="fas fa-sign-in-alt"></i> دخول
            </button>
        </div>
    </div>

    <!-- لوحة التحكم -->
    <div id="admin-panel" class="admin-layout">
        <div class="admin-sidebar">
            <div class="sidebar-header">VibeForge Admin</div>
            <div class="sidebar-menu">
                <div class="menu-item active" onclick="switchSection('video-section', this)"><i class="fas fa-video"></i> الفيديوهات</div>
                <div class="menu-item" onclick="switchSection('profile-section', this)"><i class="fas fa-user"></i> البروفايل</div>
                <div class="menu-item" onclick="switchSection('layout-section', this)"><i class="fas fa-palette"></i> المظهر الجديد</div>
                <div class="menu-item" onclick="switchSection('builder-section', this)"><i class="fas fa-hammer"></i> صنع شكل مخصص</div>
                <div class="menu-item" onclick="switchSection('preview-section', this)"><i class="fas fa-eye"></i> المعاينة</div>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
        </div>

        <div class="admin-main">
            <!-- الفيديوهات -->
            <div id="video-section" class="admin-section active">
                <div class="card">
                    <h3>إدارة الفيديوهات</h3>
                    <input type="file" id="video-file" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; color:white;">
                    <button class="btn" style="margin-top:10px;" onclick="uploadMedia('video')">رفع فيديو</button>
                </div>
            </div>

            <!-- المظهر الجديد -->
            <div id="layout-section" class="admin-section">
                <div class="card">
                    <h3>اختر مظهر العرض</h3>
                    <div class="layout-grid">
                        <div class="layout-card active" onclick="updateLayout('organic')">
                            <i class="fas fa-shapes fa-2x"></i>
                            <p>عضوي هندسي</p>
                        </div>
                        <div class="layout-card" onclick="updateLayout('rounded')">
                            <i class="fas fa-square fa-2x"></i>
                            <p>مربع مستدير</p>
                        </div>
                        <div class="layout-card" onclick="updateLayout('card')">
                            <i class="fas fa-id-card fa-2x"></i>
                            <p>نمط البطاقة</p>
                        </div>
                        <div class="layout-card" onclick="updateLayout('vertical')">
                            <i class="fas fa-columns fa-2x"></i>
                            <p>تخطيط عمودي</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- صنع شكل مخصص -->
            <div id="builder-section" class="admin-section">
                <div class="card">
                    <h3>صنع شكل مخصص (سحب وإفلات)</h3>
                    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                        <button class="btn" style="flex:1;" onclick="addCustomElement('text')">+ نص</button>
                        <button class="btn" style="flex:1;" onclick="addCustomElement('box')">+ مربع</button>
                        <button class="btn" style="flex:1;" onclick="addCustomElement('image')">+ صورة</button>
                    </div>
                    <div id="custom-builder-area" class="builder-container"></div>
                    <button class="btn" style="margin-top:10px;" onclick="saveCustomization()">حفظ التصميم</button>
                </div>
            </div>

            <!-- البروفايل -->
            <div id="profile-section" class="admin-section">
                <div class="card">
                    <h3>معلومات البروفايل</h3>
                    <input type="text" id="admin-name" placeholder="الاسم" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; color:white; margin-bottom:10px;">
                    <input type="text" id="admin-bio" placeholder="السيرة الذاتية" style="width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; color:white; margin-bottom:10px;">
                    <button class="btn" onclick="saveProfileData()">حفظ البيانات</button>
                </div>
            </div>

            <!-- المعاينة -->
            <div id="preview-section" class="admin-section">
                <div class="card">
                    <h3>معاينة الموقع</h3>
                    <iframe src="index.html" style="width:100%; height:500px; border:none; border-radius:10px;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="login-system.js"></script>
    <script src="admin.js"></script>
</body>
</html>
