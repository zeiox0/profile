<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم المتقدمة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-section { margin-bottom: 30px; }
        .control-group { margin-bottom: 15px; }
        .control-label { display: block; margin-bottom: 5px; color: #ccc; font-size: 0.9rem; }
        .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 15px; max-height: 400px; overflow-y: auto; padding: 10px; background: #1a1a1a; border-radius: 8px; }
        .media-item { position: relative; background: #222; border-radius: 5px; overflow: hidden; border: 2px solid transparent; cursor: pointer; transition: 0.3s; }
        .media-item:hover { border-color: #007bff; }
        .media-item.active { border-color: #28a745; }
        .media-item img, .media-item video { width: 100%; height: 100px; object-fit: cover; }
        .media-info { padding: 5px; font-size: 0.7rem; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .search-box { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; margin-bottom: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: #888; cursor: pointer; padding: 5px 15px; font-size: 1rem; transition: 0.3s; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid #007bff; }
        .range-val { float: left; color: #007bff; }
    </style>
</head>
<body class="admin-body">

    <div id="login-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:100; display:flex; justify-content:center; align-items:center;">
        <div class="admin-card">
            <h2 style="text-align:center; margin-bottom:20px;">تسجيل الدخول للإدارة</h2>
            <input type="email" id="email" class="admin-input" placeholder="البريد الإلكتروني">
            <input type="password" id="password" class="admin-input" placeholder="كلمة المرور">
            <button onclick="attemptLogin()" class="admin-btn">دخول</button>
            <p id="error-msg" style="color:red; display:none; margin-top:10px;"></p>
        </div>
    </div>

    <h1 style="text-align:center; margin-top: 20px; margin-bottom:30px;">لوحة التحكم المتقدمة</h1>

    <div class="admin-card">
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('settings')">الإعدادات</button>
            <button class="tab-btn" onclick="showTab('library')">مكتبة الوسائط</button>
        </div>

        <!-- قسم الإعدادات -->
        <div id="tab-settings" class="tab-content">
            <div class="admin-section">
                <h3><i class="fas fa-user"></i> البيانات الشخصية</h3>
                <input type="text" id="admin-name" class="admin-input" placeholder="الاسم">
                <input type="text" id="admin-bio" class="admin-input" placeholder="الوصف (Bio)">
            </div>

            <div class="admin-section">
                <h3><i class="fas fa-video"></i> إعدادات الفيديو والصوت</h3>
                
                <div class="control-group">
                    <label class="control-label">سرعة تشغيل الفيديو <span id="speed-val" class="range-val">1x</span></label>
                    <input type="range" id="video-speed" class="admin-input" min="0.5" max="2" step="0.1" value="1" oninput="updateRangeVal('speed', this.value)">
                </div>

                <div class="control-group">
                    <label class="control-label">مستوى الصوت الافتراضي <span id="volume-val" class="range-val">50%</span></label>
                    <input type="range" id="bg-volume" class="admin-input" min="0" max="1" step="0.1" value="0.5" oninput="updateRangeVal('volume', Math.round(this.value*100)+'%')">
                </div>

                <div class="control-group">
                    <label class="control-label">طريقة عرض الفيديو (قصه)</label>
                    <select id="video-fit" class="admin-input">
                        <option value="cover">تغطية كاملة (Cover)</option>
                        <option value="contain">احتواء كامل (Contain)</option>
                        <option value="fill">ملء المساحة (Fill)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">رابط الفيديو الحالي</label>
                    <input type="text" id="video-link" class="admin-input" placeholder="رابط MP4">
                </div>

                <div class="control-group">
                    <label class="control-label">رابط الصوت الحالي</label>
                    <input type="text" id="audio-link" class="admin-input" placeholder="رابط MP3">
                </div>
            </div>

            <button onclick="saveAllSettings()" class="admin-btn"><i class="fas fa-save"></i> حفظ جميع الإعدادات</button>
        </div>

        <!-- قسم المكتبة -->
        <div id="tab-library" class="tab-content" style="display:none;">
            <h3><i class="fas fa-images"></i> مكتبة الوسائط</h3>
            <input type="text" id="library-search" class="search-box" placeholder="بحث في الملفات..." oninput="filterLibrary()">
            
            <div class="control-group">
                <label class="control-label">رفع ملف جديد (فيديو أو صورة)</label>
                <input type="file" id="upload-file" class="admin-input" accept="video/*,image/*">
                <button onclick="uploadToLibrary()" class="admin-btn" style="background: #28a745;"><i class="fas fa-upload"></i> رفع للمكتبة</button>
                <p id="upload-status" style="margin-top:5px; font-size:0.8rem;"></p>
            </div>

            <div id="media-library" class="media-grid">
                <!-- الملفات ستظهر هنا برمجياً -->
                <p style="text-align:center; grid-column: 1/-1; color:#666;">جاري تحميل المكتبة...</p>
            </div>
            
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button onclick="useSelectedMedia('video')" class="admin-btn">استخدام كفيديو خلفية</button>
                <button onclick="useSelectedMedia('audio')" class="admin-btn">استخدام كصوت خلفية</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    
    <script src="config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
