<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر التصميم المتقدم - Visual Editor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="visual-editor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="visual-editor-body">
    <!-- شريط الأدوات العلوي -->
    <div class="editor-toolbar">
        <div class="toolbar-left">
            <button class="toolbar-btn" onclick="exitEditor()" title="خروج من المحرر">
                <i class="fas fa-arrow-left"></i> الخروج
            </button>
            <div class="toolbar-separator"></div>
            <button class="toolbar-btn" onclick="undoAction()" title="تراجع">
                <i class="fas fa-undo"></i>
            </button>
            <button class="toolbar-btn" onclick="redoAction()" title="إعادة">
                <i class="fas fa-redo"></i>
            </button>
            <div class="toolbar-separator"></div>
            <button class="toolbar-btn" onclick="resetToDefault()" title="إعادة تعيين">
                <i class="fas fa-refresh"></i> إعادة تعيين
            </button>
        </div>
        <div class="toolbar-center">
            <h2>🎨 محرر التصميم المتقدم</h2>
        </div>
        <div class="toolbar-right">
            <button class="toolbar-btn secondary" onclick="discardChanges()" title="إلغاء التغييرات">
                <i class="fas fa-times"></i> إلغاء
            </button>
            <button class="toolbar-btn primary" onclick="saveChanges()" title="حفظ التغييرات">
                <i class="fas fa-save"></i> حفظ
            </button>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <!-- زر تبديل القوائم الجانبية -->
    <button id="sidebar-toggle-btn" class="sidebar-toggle-btn" onclick="toggleSidebars()" title="تبديل القوائم الجانبية">
        <i class="fas fa-columns"></i>
    </button>

    <div class="editor-container">
        <!-- اللوحة الجانبية اليمنى (الأدوات) -->
        <aside class="editor-sidebar right-sidebar" id="right-sidebar">
            <div class="sidebar-tabs">
                <div class="tab-btn active" onclick="switchEditorTab('elements')" data-tab="elements">
                    <i class="fas fa-layer-group"></i> العناصر
                </div>
                <div class="tab-btn" onclick="switchEditorTab('properties')" data-tab="properties">
                    <i class="fas fa-sliders-h"></i> الخصائص
                </div>
                <div class="tab-btn" onclick="switchEditorTab('add')" data-tab="add">
                    <i class="fas fa-plus"></i> إضافة
                </div>
            </div>

            <!-- تبويب العناصر -->
            <div class="tab-content active" id="elements-tab">
                <h3>قائمة العناصر</h3>
                <div id="layers-panel" class="layers-panel">
                    <!-- تظهر هنا قائمة العناصر مرتبة -->
                </div>
            </div>

            <!-- تبويب الخصائص -->
            <div class="tab-content" id="properties-tab">
                <h3>خصائص العنصر</h3>
                <div id="properties-panel" class="properties-panel">
                    <p style="color: #999; text-align: center;">اختر عنصراً لتعديل خصائصه</p>
                </div>
            </div>

            <!-- تبويب الإضافة -->
            <div class="tab-content" id="add-tab">
                <h3>إضافة عناصر جديدة</h3>
                <div class="add-elements-panel">
                    <button class="add-btn" onclick="addNewElement('text')">
                        <i class="fas fa-font"></i> نص
                    </button>
                    <button class="add-btn" onclick="addNewElement('image')">
                        <i class="fas fa-image"></i> صورة
                    </button>
                    <button class="add-btn" onclick="addNewElement('icon')">
                        <i class="fas fa-star"></i> أيقونة
                    </button>
                    <button class="add-btn" onclick="addNewElement('tab')">
                        <i class="fas fa-square"></i> تاب
                    </button>
                    <button class="add-btn" onclick="addNewElement('shape')">
                        <i class="fas fa-circle"></i> شكل
                    </button>
                </div>
            </div>
        </aside>

        <!-- منطقة المحرر الرئيسية -->
        <div class="editor-canvas-wrapper">
            <!-- معاينة الموقع الحية -->
            <div id="editor-canvas" class="editor-canvas">
                <!-- سيتم تحميل نسخة من index.html هنا -->
            </div>
        </div>

        <!-- اللوحة الجانبية اليسرى (الخيارات المتقدمة) -->
        <aside class="editor-sidebar left-sidebar" id="left-sidebar">
            <div class="sidebar-section">
                <h3>⚙️ الإعدادات المتقدمة</h3>
                
                <div class="setting-group">
                    <label>الشكل:</label>
                    <select id="element-shape" class="editor-input" onchange="updateElementProperty('shape', this.value)">
                        <option value="square">مربع</option>
                        <option value="circle">دائري</option>
                        <option value="triangle">مثلث</option>
                        <option value="star">نجمة</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>الحركة:</label>
                    <select id="element-animation" class="editor-input" onchange="updateElementProperty('animation', this.value)">
                        <option value="none">بدون حركة</option>
                        <option value="scale">تكبير/تصغير</option>
                        <option value="move">حركة</option>
                        <option value="random">عشوائية</option>
                        <option value="pulse">نبض</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>
                        <input type="checkbox" id="link-to-music" onchange="updateElementProperty('linkToMusic', this.checked)">
                        ربط الحركة بالموسيقى
                    </label>
                </div>

                <div class="setting-group">
                    <label>مشغل الصوت:</label>
                    <select id="player-visibility" class="editor-input" onchange="updatePlayerSettings('visibility', this.value)">
                        <option value="show">إظهار</option>
                        <option value="hide">إخفاء</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>موقع مشغل الصوت:</label>
                    <select id="player-position" class="editor-input" onchange="updatePlayerSettings('position', this.value)">
                        <option value="bottom">أسفل الصفحة</option>
                        <option value="free">حر</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>
                        <input type="checkbox" id="player-transparent-bg" checked onchange="updatePlayerSettings('transparentBg', this.checked)">
                        خلفية شفافة
                    </label>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>🎨 الألوان والشفافية</h3>
                
                <div class="setting-group">
                    <label>اللون:</label>
                    <input type="color" id="element-color" class="editor-input color-input" value="#ffffff" onchange="updateElementProperty('color', this.value)">
                </div>

                <div class="setting-group">
                    <label>الشفافية:</label>
                    <div class="slider-group">
                        <input type="range" id="element-opacity" class="editor-input slider" min="0" max="100" value="100" oninput="updateElementProperty('opacity', this.value)">
                        <span id="opacity-value">100%</span>
                    </div>
                </div>

                <div class="setting-group">
                    <label>الحجم:</label>
                    <div class="slider-group">
                        <input type="range" id="element-size" class="editor-input slider" min="20" max="500" value="100" oninput="updateElementProperty('size', this.value)">
                        <span id="size-value">100px</span>
                    </div>
                </div>

                <div class="setting-group">
                    <label>الموضع X:</label>
                    <input type="number" id="element-x" class="editor-input" value="0" onchange="updateElementProperty('x', this.value)">
                </div>

                <div class="setting-group">
                    <label>الموضع Y:</label>
                    <input type="number" id="element-y" class="editor-input" value="0" onchange="updateElementProperty('y', this.value)">
                </div>
            </div>

            <div class="sidebar-section">
                <h3>🗑️ الإجراءات</h3>
                <button class="delete-btn" onclick="deleteSelectedElement()">
                    <i class="fas fa-trash"></i> حذف العنصر
                </button>
            </div>
        </aside>
    </div>

    <!-- نافذة إضافة عنصر جديد -->
    <div id="add-element-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>إضافة عنصر جديد</h3>
                <button class="modal-close" onclick="closeAddModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="add-element-form"></div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="visual-editor.js"></script>
    <script src="visual-editor-advanced.js"></script>
</body>
</html>
