<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdallah | Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="entry-screen"><span id="enter-btn">ENTER</span></div>

    <div id="main-content" class="hidden">
        <!-- فيديو الخلفية -->
        <video id="bg-video" playsinline muted loop>
            <source id="video-src" src="" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        
        <div class="fog-overlay"></div>
        
        <div class="profile-info">
            <h1 id="user-name">Loading...</h1>
            <p id="user-bio"></p>
            <div id="social-links"></div>
        </div>
        
        <!-- الموسيقى الخلفية -->
        <audio id="bg-music" loop>
            <source id="audio-src" src="" type="audio/mpeg">
        </audio>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    
    <script src="config.js"></script>
    <script src="security.js"></script>
    <script>
        // متغيرات عامة
        let videoElement = null;
        let audioElement = null;
        let isMediaReady = false;

        // جلب البيانات من فايربيس
        db.collection('siteData').doc('config').onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                
                // تحديث اسم المستخدم والسيرة الذاتية
                document.getElementById('user-name').innerText = data.name || "zeiox";
                document.getElementById('user-bio').innerText = data.bio || "";
                
                // تحديث الفيديو
                if(data.video) {
                    videoElement = document.getElementById('bg-video');
                    const sourceElement = document.getElementById('video-src');
                    
                    sourceElement.src = data.video;
                    sourceElement.type = 'video/mp4';
                    
                    // إعادة تحميل الفيديو
                    videoElement.load();
                    
                    // التحقق من جاهزية الفيديو
                    videoElement.addEventListener('canplay', function() {
                        isMediaReady = true;
                        console.log('Video is ready to play');
                    }, { once: true });
                    
                    // معالجة الأخطاء
                    videoElement.addEventListener('error', function(e) {
                        console.error('Video error:', e);
                    });
                }
                
                // تحديث الصوت
                if(data.audio) {
                    audioElement = document.getElementById('bg-music');
                    const audioSourceElement = document.getElementById('audio-src');
                    
                    audioSourceElement.src = data.audio;
                    audioSourceElement.type = 'audio/mpeg';
                    
                    audioElement.load();
                }
            }
        });

        // اختفاء شاشة الدخول وتشغيل الميديا
        document.getElementById('entry-screen').addEventListener('click', function() {
            this.classList.add('fade-out');
            
            setTimeout(() => {
                this.style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                
                // تشغيل الفيديو
                videoElement = document.getElementById('bg-video');
                audioElement = document.getElementById('bg-music');
                
                if(videoElement && videoElement.src) {
                    // محاولة تشغيل الفيديو مع معالجة الأخطاء
                    let playPromise = videoElement.play();
                    if (playPromise !== undefined) {
                        playPromise
                            .then(() => {
                                console.log('Video is playing');
                            })
                            .catch(error => {
                                console.log('Video playback failed:', error);
                                // محاولة إعادة التحميل والتشغيل
                                videoElement.load();
                                videoElement.play().catch(err => console.log('Retry failed:', err));
                            });
                    }
                }
                
                // تشغيل الصوت (اختياري)
                if(audioElement && audioElement.src) {
                    audioElement.play().catch(error => {
                        console.log('Audio playback failed:', error);
                    });
                }
            }, 800);
        });
    </script>
</body>
</html>
