<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdallah | Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- شاشة الدخول -->
    <div id="enter-screen" class="enter-screen">
        <div class="enter-content">
            <button class="enter-btn-minimal" onclick="handleEnter()">
                <span>ENTER</span>
            </button>
        </div>
    </div>

    <div id="main-content" class="main-content blurred" data-template="default">
        <!-- خلفية الوسائط (فيديو أو صورة) -->
        <div id="media-background" class="media-background">
            <video id="bg-video" playsinline muted preload="auto" loop style="display: none; width: 100%; height: 100%; object-fit: cover; position: fixed; top: 0; left: 0; z-index: -1;"></video>
            <div id="bg-image" class="bg-image" style="display: none; background-size: cover; background-position: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;"></div>
            <div id="no-media" class="no-media" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; display: flex; align-items: center; justify-content: center; color: #333;">
                <p>لا يوجد محتوى لعرضه</p>
            </div>
        </div>

        <!-- محتوى الملف الشخصي -->
        <div class="profile-wrapper">
            <div id="visualizer-container" class="visualizer-container">
                <canvas id="audio-visualizer"></canvas>
            </div>
            
            <div class="profile-card glass" id="main-profile-card">
                <div class="profile-header">
                    <div class="avatar-container" id="avatar-box">
                        <img id="user-avatar" src="https://via.placeholder.com/150" alt="Avatar" onerror="this.src='https://via.placeholder.com/150'; this.onerror=null;">
                    </div>
                    <div class="user-info">
                        <h1 id="user-name">Abdallah</h1>
                        <div id="user-badges" class="badges">
                            <i class="fas fa-check-circle" title="Verified"></i>
                            <i class="fas fa-code" title="Developer"></i>
                            <i class="fas fa-star" title="Premium"></i>
                        </div>
                        <p id="user-bio">جاري التحميل...</p>
                    </div>
                </div>

                <div class="profile-sections">
                    <div id="social-links" class="social-icons">
                        <!-- الروابط الاجتماعية تظهر هنا -->
                    </div>
                </div>

                <div class="profile-footer" id="profile-stats-footer">
                    <div class="stats">
                        <span><i class="fas fa-eye"></i> <span id="view-count">0</span></span>
                        <span><i class="fas fa-map-marker-alt"></i> <span id="user-location">Earth</span></span>
                    </div>
                </div>
            </div>

            <!-- زر الانتقال للأسفل الكلاسيكي -->
            <button class="scroll-down-btn classic" onclick="scrollToBottom()" title="الانتقال للأسفل">
                <i class="fas fa-chevron-down"></i>
            </button>

            <!-- مشغل الموسيقى المتطور -->
            <div class="advanced-player glass">
                <div class="player-left">
                    <img id="music-cover" src="https://via.placeholder.com/60" alt="Cover" onerror="this.src='https://via.placeholder.com/60'; this.onerror=null;">
                    <div class="track-info">
                        <h4 id="track-title">لا يوجد صوت</h4>
                        <p id="track-artist">---</p>
                    </div>
                </div>
                <div class="player-center">
                    <div class="player-controls">
                        <button id="prev-btn" class="p-btn" onclick="prevTrack()"><i class="fas fa-step-backward"></i></button>
                        <button id="play-pause-btn" class="p-btn play-main" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                        <button id="next-btn" class="p-btn" onclick="nextTrack()"><i class="fas fa-step-forward"></i></button>
                    </div>
                    <div class="progress-container">
                        <span id="curr-time">0:00</span>
                        <input type="range" id="progress-bar" min="0" max="100" value="0" oninput="seekAudio(this.value)">
                        <span id="total-time">0:00</span>
                    </div>
                </div>
                <div class="player-right">
                    <div class="volume-control">
                        <button id="mute-btn" class="p-btn" onclick="toggleMute()"><i class="fas fa-volume-up"></i></button>
                        <input type="range" id="volume-slider" min="0" max="100" value="50" oninput="setVolume(this.value)">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="main-audio" preload="auto"></audio>

    <script>
        let enterPressed = false;
        let canInteract = false;

        // التحكم بزر Enter في الكيبورد
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !canInteract) {
                e.preventDefault();
                handleEnter();
            }
        });

        // الضغط في أي مكان لفتح الموقع بعد التفاعل الأول
        document.addEventListener('click', (e) => {
            if (!canInteract && !e.target.closest('.enter-btn-minimal')) {
                handleEnter();
            }
        });

        function scrollToBottom() {
            window.scrollTo({
                top: document.body.scrollHeight,
                behavior: 'smooth'
            });
        }
    </script>

    <script src="config.js"></script>
    <script>
        let siteData = {};
        let currentAudioIndex = 0;
        let isPlaying = false;
        
        // تعريف المتغيرات الأساسية بشكل عالمي لضمان عمل جميع الوظائف
        const audioElem = document.getElementById('main-audio');
        const videoElem = document.getElementById('bg-video');
        const enterScreen = document.getElementById('enter-screen');
        const mainContent = document.getElementById('main-content');
        
        function handleEnter() {
            if (canInteract) return;
            
            const eScreen = document.getElementById('enter-screen');
            const mContent = document.getElementById('main-content');
            const aElem = document.getElementById('main-audio');
            const vElem = document.getElementById('bg-video');
            
            eScreen.classList.add('hidden');
            mContent.classList.remove('blurred');
            isPlaying = true;
            canInteract = true;
            
            // تهيئة وتفعيل AudioContext فوراً لضمان خروج الصوت
            try {
                if (!window.audioCtx) {
                    initVisualizer();
                }
                // تفعيل AudioContext بشكل فوري
                if (window.audioCtx) {
                    if (window.audioCtx.state === 'suspended') {
                        window.audioCtx.resume().then(() => {
                            console.log('AudioContext resumed successfully');
                        }).catch(e => {
                            console.log('AudioContext resume failed:', e);
                        });
                    }
                }
            } catch (e) {
                console.log("AudioContext init failed:", e);
            }
            
            // تشغيل الصوت والفيديو مع ضمان رفع الصوت وإلغاء الكتم
            if (aElem && aElem.src) {
                aElem.muted = false;
                aElem.volume = 1.0;
                aElem.play().then(() => {
                    console.log("Audio started playing successfully");
                    const btn = document.getElementById('play-pause-btn');
                    if (btn) btn.innerHTML = '<i class="fas fa-pause"></i>';
                }).catch(e => {
                    console.log("Audio play failed:", e);
                    isPlaying = false;
                });
            }
            if (vElem && vElem.src) {
                vElem.play().catch(e => console.log("Video play failed:", e));
            }
            
            // إخفاء شاشة الدخول بعد الانتقال
            setTimeout(() => {
                eScreen.style.display = 'none';
            }, 1000);
        }

        function loadData() {
            if (typeof db === 'undefined') return setTimeout(loadData, 500);
            db.collection('siteData').doc('config').onSnapshot((doc) => {
                if (doc.exists) {
                    siteData = doc.data();
                    updateUI();
                } else {
                    console.log("No config found in Firestore");
                }
            }, (error) => {
                console.error("Firestore error:", error);
            });
        }

        function updateUI() {
            const profile = siteData.profile || {};
            const template = siteData.template || { id: 'default', bgColor: '#000000', bgEffect: 'none', showAvatar: true, showVisualizer: true, showStats: true };
            
            document.getElementById('user-name').innerText = profile.name || "Abdallah";
            document.getElementById('user-bio').innerText = profile.bio || "Hi I 👋";
            document.getElementById('user-avatar').src = profile.avatar || "https://via.placeholder.com/150";
            
            // تطبيق إعدادات القالب
            mainContent.setAttribute('data-template', template.id || 'default');
            document.body.style.backgroundColor = template.bgColor || '#000000';
            
            // تخصيص العناصر
            document.getElementById('avatar-box').style.display = template.showAvatar !== false ? 'block' : 'none';
            document.getElementById('visualizer-container').style.display = template.showVisualizer !== false ? 'block' : 'none';
            document.getElementById('profile-stats-footer').style.display = template.showStats !== false ? 'block' : 'none';
            
            // تأثير الخلفية
            const mediaBg = document.getElementById('media-background');
            if (template.bgEffect === 'blur') mediaBg.style.filter = 'blur(10px)';
            else if (template.bgEffect === 'grayscale') mediaBg.style.filter = 'grayscale(100%)';
            else if (template.bgEffect === 'darken') mediaBg.style.filter = 'brightness(40%)';
            else mediaBg.style.filter = 'none';

            // تحديث الروابط الاجتماعية
            const socialDiv = document.getElementById('social-links');
            socialDiv.innerHTML = '';
            const social = profile.social || {};
            const icons = {
                discord: 'fab fa-discord',
                youtube: 'fab fa-youtube',
                twitter: 'fab fa-twitter',
                instagram: 'fab fa-instagram',
                tiktok: 'fab fa-tiktok',
                github: 'fab fa-github'
            };

            for (let key in social) {
                if (social[key]) {
                    const a = document.createElement('a');
                    let url = social[key].trim();
                    if (!url.startsWith('http')) {
                        if (key === 'discord') url = `https://discord.com/users/${url}`;
                        else if (key === 'tiktok') url = `https://tiktok.com/@${url}`;
                        else url = `https://${key}.com/${url}`;
                    }
                    a.href = url;
                    a.target = "_blank";
                    a.innerHTML = `<i class="${icons[key] || 'fas fa-link'}"></i>`;
                    socialDiv.appendChild(a);
                }
            }

            // تحديث الخلفية
            const bgImage = document.getElementById('bg-image');
            const noMedia = document.getElementById('no-media');
            
            if (siteData.videos && siteData.videos.length > 0) {
                const videoUrl = siteData.videos[0].url;
                if (videoUrl && videoUrl.startsWith('http')) {
                    if (videoElem.src !== videoUrl) {
                        videoElem.src = videoUrl;
                        videoElem.load();
                    }
                    videoElem.style.display = 'block';
                    bgImage.style.display = 'none';
                    noMedia.style.display = 'none';
                    if (isPlaying) videoElem.play().catch(e => console.log("Video play failed:", e));
                } else {
                    showAvatarAsBg(profile, bgImage, noMedia);
                }
            } else {
                showAvatarAsBg(profile, bgImage, noMedia);
            }

            // تحديث الصوت
            if (siteData.audios && siteData.audios.length > 0) {
                const currentUrl = siteData.audios[currentAudioIndex] ? siteData.audios[currentAudioIndex].url : '';
                if (!audioElem.src || audioElem.getAttribute('data-src') !== currentUrl) {
                    loadAudio(currentAudioIndex);
                }
            }
            
            // تهيئة الموجة الصوتية إذا كانت مفعلة
            if (template.showVisualizer !== false) initVisualizer();
        }

        let visualizerInited = false;
        function initVisualizer() {
            if (visualizerInited) return;
            const canvas = document.getElementById('audio-visualizer');
            const ctx = canvas.getContext('2d');
            
            // إنشاء AudioContext وتفعيله فوراً
            if (!window.audioCtx) {
                window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            // تفعيل AudioContext إذا كان معلقاً
            if (window.audioCtx.state === 'suspended') {
                window.audioCtx.resume().catch(e => console.log('AudioContext resume failed:', e));
            }
            
            const analyser = window.audioCtx.createAnalyser();
            const audioElement = document.getElementById('main-audio');
            
            // التأكد من أن الصوت متصل بشكل صحيح
            let source;
            try {
                source = window.audioCtx.createMediaElementSource(audioElement);
                source.connect(analyser);
                analyser.connect(window.audioCtx.destination);
                console.log('Audio source connected successfully');
            } catch (e) {
                console.log('Audio source connection error:', e);
                // إذا كان الصوت متصلاً بالفعل، استخدم الـ analyser مباشرة
                analyser.connect(window.audioCtx.destination);
            }
            
            analyser.fftSize = 256;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            function draw() {
                requestAnimationFrame(draw);
                analyser.getByteFrequencyData(dataArray);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const barWidth = (canvas.width / bufferLength) * 2.5;
                let barHeight;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    barHeight = dataArray[i] / 2;
                    ctx.fillStyle = `rgba(0, 255, 136, ${barHeight / 100})`;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                    x += barWidth + 1;
                }
            }
            
            canvas.width = window.innerWidth;
            canvas.height = 150;
            draw();
            visualizerInited = true;
            console.log('Visualizer initialized successfully');
        }

        function showAvatarAsBg(profile, bgImage, noMedia) {
            const vElem = document.getElementById('bg-video');
            if (vElem) vElem.style.display = 'none';
            if (profile.avatar) {
                bgImage.style.display = 'block';
                bgImage.style.backgroundImage = `url('${profile.avatar}')`;
                noMedia.style.display = 'none';
            } else {
                bgImage.style.display = 'none';
                noMedia.style.display = 'block';
            }
        }

        function loadAudio(index) {
            if (!siteData.audios || siteData.audios.length === 0) {
                // Fallback إذا لم تكن هناك ملفات صوتية في قاعدة البيانات
                console.log("No audios found in siteData, checking for local fallback...");
                return;
            }
            currentAudioIndex = (index + siteData.audios.length) % siteData.audios.length;
            const audio = siteData.audios[currentAudioIndex];
            if (!audio || !audio.url) return;
            
            audioElem.setAttribute('data-src', audio.url);
            audioElem.src = audio.url;
            audioElem.load();
            document.getElementById('track-title').innerText = audio.name || "صوت مضاف";
            document.getElementById('track-artist').innerText = "فنان";
            
            if (isPlaying || canInteract) {
                audioElem.play().then(() => {
                    const btn = document.getElementById('play-pause-btn');
                    if (btn) btn.innerHTML = '<i class="fas fa-pause"></i>';
                }).catch(e => console.log("Audio play failed:", e));
            }
        }

        function togglePlay() {
            const btn = document.getElementById('play-pause-btn');
            if (audioElem.paused) {
                audioElem.muted = false;
                if (audioElem.volume < 0.1) audioElem.volume = 1.0;
                audioElem.play().catch(e => console.log("Play failed:", e));
                btn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                audioElem.pause();
                btn.innerHTML = '<i class="fas fa-play"></i>';
            }
        }

        function nextTrack() { loadAudio(currentAudioIndex + 1); }
        function prevTrack() { loadAudio(currentAudioIndex - 1); }
        function seekAudio(value) { if (audioElem.duration) audioElem.currentTime = (value / 100) * audioElem.duration; }
        function setVolume(value) { audioElem.volume = value / 100; }
        function toggleMute() { audioElem.muted = !audioElem.muted; }

        audioElem.ontimeupdate = () => {
            if (audioElem.duration) {
                const progress = (audioElem.currentTime / audioElem.duration) * 100;
                document.getElementById('progress-bar').value = progress;
                document.getElementById('curr-time').innerText = formatTime(audioElem.currentTime);
                document.getElementById('total-time').innerText = formatTime(audioElem.duration);
            }
        };

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        window.onload = loadData;

        // معالجات الكيبورد للتحكم في الصوت
        document.addEventListener('keydown', (e) => {
            if (canInteract && enterScreen.style.display === 'none') {
                // التحكم في الصوت بالأسهم
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    adjustVolume(5);
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    adjustVolume(-5);
                } else if (e.key === ' ') {
                    e.preventDefault();
                    togglePlay();
                }
            }
        });

        function adjustVolume(delta) {
            const currentVolume = audioElem.volume * 100;
            const newVolume = Math.max(0, Math.min(100, currentVolume + delta));
            audioElem.volume = newVolume / 100;
            // تحديث شريط الصوت إذا كان موجوداً
            const volumeSlider = document.getElementById('volume-slider');
            if (volumeSlider) {
                volumeSlider.value = newVolume;
            }
        }
    </script>
</body>
</html>
