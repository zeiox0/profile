<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="موقع شخصي احترافي">
    <meta name="google-site-verification" content="zeiox0.github.io">
    
    <!-- Google Search Console - تحديد النطاق -->
    <link rel="canonical" href="https://zeiox0.github.io">
    
    <title>Abdallah | Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- شاشة الدخول -->
    <div id="entry-screen">
        <span id="enter-btn">ENTER</span>
    </div>

    <div id="main-content" class="hidden">
        <!-- فيديو الخلفية مع عرض متجاوب -->
        <video id="bg-video" autoplay loop playsinline muted preload="auto" style="background: black;">
            <source id="video-src" src="" type="video/mp4">
        </video>
        
        <!-- طبقة التراكب (تم تقليل العتامة لضمان رؤية الفيديو) -->
        <div class="fog-overlay"></div>
        
        <!-- معلومات الملف الشخصي -->
        <div class="profile-info">
            <h1 id="user-name">Loading...</h1>
            <p id="user-bio"></p>
            <div id="social-links"></div>
        </div>
        
        <!-- صوت الخلفية -->
        <audio id="bg-music" loop preload="auto">
            <source id="audio-src" src="" type="audio/mpeg">
        </audio>
        
        <!-- أدوات التحكم في الفيديو والصوت -->
        <div class="media-controls">
            <!-- التحكم في الفيديو -->
            <div class="control-group">
                <button id="video-toggle" class="control-btn" title="تشغيل/إيقاف الفيديو">
                    <i class="fas fa-video"></i>
                </button>
                <input type="range" id="video-brightness" class="control-slider" min="0" max="200" value="100" title="سطوع الفيديو">
            </div>
            
            <!-- التحكم في الصوت -->
            <div class="control-group">
                <button id="audio-toggle" class="control-btn" title="تشغيل/إيقاف الصوت">
                    <i class="fas fa-volume-up"></i>
                </button>
                <input type="range" id="audio-volume" class="control-slider" min="0" max="100" value="50" title="مستوى الصوت">
            </div>
        </div>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    
    <!-- Config و Security -->
    <script src="config.js"></script>
    <script src="security.js"></script>
    
    <!-- Main Script -->
    <script>
        let videoPlaying = true;
        let audioPlaying = true;
        const videoElement = document.getElementById('bg-video');
        const audioElement = document.getElementById('bg-music');
        
        // جلب البيانات من Firebase
        db.collection('siteData').doc('config').onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('user-name').innerText = data.name || "zeiox";
                document.getElementById('user-bio').innerText = data.bio || "";
                
                // تحديث الفيديو إذا تغير الرابط
                if(data.video && videoElement.src !== data.video) {
                    videoElement.src = data.video;
                    videoElement.load();
                    // إذا كان المستخدم قد دخل بالفعل، نحاول التشغيل
                    if(!document.getElementById('main-content').classList.contains('hidden')) {
                        videoElement.play().catch(e => console.log('Autoplay blocked:', e));
                    }
                }
                
                // تحديث الصوت إذا تغير الرابط
                if(data.audio && audioElement.src !== data.audio) {
                    audioElement.src = data.audio;
                    audioElement.load();
                }
            }
        });

        // تشغيل الميديا عند الضغط على ENTER
        document.getElementById('entry-screen').addEventListener('click', function() {
            this.classList.add('fade-out');
            setTimeout(() => {
                this.style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                
                // تشغيل الفيديو والصوت (يجب أن يتم بعد تفاعل المستخدم)
                videoElement.play().catch(e => console.error('Video error:', e));
                audioElement.play().catch(e => console.error('Audio error:', e));
            }, 800);
        });

        // التحكم في الفيديو
        document.getElementById('video-toggle').addEventListener('click', function() {
            if (videoPlaying) {
                videoElement.pause();
                this.innerHTML = '<i class="fas fa-video-slash"></i>';
                this.style.opacity = '0.5';
            } else {
                videoElement.play();
                this.innerHTML = '<i class="fas fa-video"></i>';
                this.style.opacity = '1';
            }
            videoPlaying = !videoPlaying;
        });

        // التحكم في سطوع الفيديو
        document.getElementById('video-brightness').addEventListener('input', function(e) {
            videoElement.style.filter = `brightness(${e.target.value}%)`;
        });

        // التحكم في الصوت
        document.getElementById('audio-toggle').addEventListener('click', function() {
            if (audioPlaying) {
                audioElement.pause();
                this.innerHTML = '<i class="fas fa-volume-mute"></i>';
                this.style.opacity = '0.5';
            } else {
                audioElement.play();
                this.innerHTML = '<i class="fas fa-volume-up"></i>';
                this.style.opacity = '1';
            }
            audioPlaying = !audioPlaying;
        });

        // التحكم في مستوى الصوت
        document.getElementById('audio-volume').addEventListener('input', function(e) {
            audioElement.volume = e.target.value / 100;
        });

        // تحسين العرض المتجاوب
        function adjustLayout() {
            const isMobile = window.innerWidth <= 768;
            videoElement.style.objectFit = isMobile ? 'cover' : 'cover';
            // إذا كان كمبيوتر، نجعل الفيديو يظهر بشكل Rectangle (كما طلب المستخدم)
            if(!isMobile) {
                videoElement.style.width = '100%';
                videoElement.style.height = '100%';
            }
        }
        window.addEventListener('resize', adjustLayout);
        window.addEventListener('load', adjustLayout);
    </script>
</body>
</html>
