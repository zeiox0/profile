<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر التصميم الشامل النهائي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبات Firebase و Supabase للحماية والبيانات -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="security.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #fff;
            direction: rtl;
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            gap: 0;
        }

        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .preview-header {
            background: #1a1f3a;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ff88;
        }

        .toolbar {
            background: #0a0e27;
            padding: 8px 15px;
            display: flex;
            gap: 8px;
            border-bottom: 2px solid #00ff88;
            flex-wrap: wrap;
            overflow-y: auto;
            max-height: 80px;
        }

        .toolbar button {
            background: #00ff88;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            white-space: nowrap;
        }

        .toolbar button:hover {
            background: #00dd77;
            transform: scale(1.05);
        }

        .toolbar button:disabled {
            background: #888;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .toolbar button.danger {
            background: #ff4d4d;
            color: #fff;
        }

        .toolbar button.lock-active {
            background: #ff6b6b;
            color: #fff;
        }

        .preview-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .device-frame {
            background: #1a1f3a;
            border: 15px solid #0a0e27;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            overflow: hidden;
            position: relative;
            max-width: 100%;
            max-height: 100%;
        }

        .device-frame.pc {
            width: 1024px;
            height: 600px;
        }

        .device-frame.mobile {
            width: 375px;
            height: 667px;
        }

        .device-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        .device-notch {
            position: absolute;
            top: 0;
            right: 50%;
            transform: translateX(50%);
            width: 150px;
            height: 25px;
            background: #0a0e27;
            border-radius: 0 0 20px 20px;
            z-index: 10;
            display: none;
        }

        .device-frame.mobile .device-notch {
            display: block;
        }

        .device-label {
            position: absolute;
            bottom: -30px;
            right: 50%;
            transform: translateX(50%);
            color: #00ff88;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .device-controls {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 4px;
            z-index: 20;
        }

        .device-btn {
            padding: 4px 8px;
            background: #00ff88;
            border: none;
            color: #000;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 10px;
            transition: all 0.2s;
        }

        .device-btn:hover {
            background: #00dd77;
        }

        /* شريط التحرير السفلي الجديد */
        .bottom-panel {
            width: 100%;
            height: 280px;
            background: #1a1f3a;
            border-top: 2px solid #00ff88;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.3s ease, height 0.3s ease;
            z-index: 100;
        }

        .bottom-panel.hidden {
            height: 0;
            transform: translateY(100%);
            border-top: none;
            overflow: hidden;
        }

        .bottom-panel-header {
            background: #0a0e27;
            padding: 12px;
            border-bottom: 2px solid #00ff88;
            font-weight: bold;
            color: #00ff88;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bottom-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .control-section {
            background: #0a0e27;
            padding: 12px;
            border-radius: 4px;
            border-left: 3px solid #00ff88;
        }

        .control-label {
            font-size: 11px;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 8px;
            display: block;
        }

        .view-tabs {
            display: flex;
            gap: 4px;
            margin: 8px 0;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 8px;
        }

        .view-tab {
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .view-tab.active {
            color: #00ff88;
            border-bottom-color: #00ff88;
        }

        .btn-group {
            display: flex;
            gap: 4px;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .btn-group button {
            flex: 1;
            min-width: 70px;
            padding: 6px;
            background: #00ff88;
            border: none;
            color: #000;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 10px;
            transition: all 0.2s;
        }

        .btn-group button:hover {
            background: #00dd77;
        }

        .btn-group button:disabled {
            background: #888;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00ff88;
            color: #000;
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
            z-index: 10001;
            font-size: 11px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 5000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1f3a;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #00ff88;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 10px;
        }

        .modal-header h3 {
            color: #00ff88;
            font-size: 14px;
        }

        .close-modal {
            background: #ff4d4d;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
        }

        .fullscreen-view {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 6000;
            display: none;
        }

        .fullscreen-view.show {
            display: flex;
            flex-direction: column;
        }

        .fullscreen-header {
            background: #1a1f3a;
            padding: 10px 20px;
            border-bottom: 2px solid #00ff88;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fullscreen-content {
            flex: 1;
            overflow: hidden;
        }

        .fullscreen-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .bottom-panel-content::-webkit-scrollbar,
        .modal-content::-webkit-scrollbar,
        .toolbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .bottom-panel-content::-webkit-scrollbar-track,
        .modal-content::-webkit-scrollbar-track,
        .toolbar::-webkit-scrollbar-track {
            background: #0a0e27;
        }

        .bottom-panel-content::-webkit-scrollbar-thumb,
        .modal-content::-webkit-scrollbar-thumb,
        .toolbar::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 3px;
        }

        .slider-container {
            margin-bottom: 12px;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: #2a2f4a;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            border: none;
        }

        .device-switch-container {
            display: flex;
            background: #0a0e27;
            border: 1px solid #00ff88;
            border-radius: 20px;
            padding: 2px;
            margin-left: 15px;
        }

        .device-switch-btn {
            padding: 5px 15px;
            border: none;
            background: transparent;
            color: #00ff88;
            cursor: pointer;
            border-radius: 18px;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .device-switch-btn.active {
            background: #00ff88;
            color: #000;
        }

        #toggle-bottom-btn {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #00ff88;
            color: #000;
            border: none;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }

        #toggle-bottom-btn:hover {
            transform: scale(1.1);
            background: #00dd77;
        }

        #lock-selection-btn {
            background: #00ff88;
            color: #000;
        }

        #lock-selection-btn.locked {
            background: #ff6b6b;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <div class="preview-area">
            <div class="preview-header">
                <h2>🎨 محرر التصميم الشامل النهائي</h2>
                <span id="view-mode">عرض: PC</span>
            </div>

            <div class="toolbar">
                <button onclick="saveChanges()"><i class="fas fa-save"></i> حفظ</button>
                <button id="undo-btn" onclick="undoChanges()" disabled><i class="fas fa-undo"></i> تراجع</button>
                <button id="redo-btn" onclick="redoChanges()" disabled><i class="fas fa-redo"></i> إعادة</button>
                
                <div class="device-switch-container">
                    <button class="device-switch-btn active" id="btn-pc" onclick="switchView('pc')">
                        <i class="fas fa-desktop"></i> PC
                    </button>
                    <button class="device-switch-btn" id="btn-mobile" onclick="switchView('mobile')">
                        <i class="fas fa-mobile-alt"></i> Mobile
                    </button>
                </div>

                <button id="lock-selection-btn" onclick="toggleSelectionLock()" title="قفل/تفعيل التحديد">
                    <i class="fas fa-lock-open"></i> تفعيل التحديد
                </button>

                <button onclick="showAddElement()"><i class="fas fa-plus"></i> إضافة عنصر</button>
                <button onclick="showDeleteRecovery()"><i class="fas fa-trash"></i> حذف</button>
                <button onclick="showAnimations()"><i class="fas fa-film"></i> حركات</button>
                <button onclick="showTextEffects()"><i class="fas fa-font"></i> النصوص</button>
                <button onclick="showMediaEditor()"><i class="fas fa-image"></i> الوسائط</button>
                <button onclick="showTemplates()"><i class="fas fa-copy"></i> النسخ</button>
                <button class="danger" onclick="exitEditor()"><i class="fas fa-times"></i> خروج</button>
            </div>

            <div class="preview-content">
                <div class="device-frame pc" id="device-frame">
                    <div class="device-notch"></div>
                    <iframe id="page-iframe" src="index.html"></iframe>
                    <div class="device-label" id="device-label">PC - 1024x600</div>
                </div>
            </div>
        </div>

        <!-- شريط التحرير السفلي الجديد -->
        <div class="bottom-panel" id="bottom-panel">
            <div class="bottom-panel-header">
                <span><i class="fas fa-sliders-h"></i> التحكم والإعدادات</span>
                <i class="fas fa-times" onclick="toggleBottomPanel()" style="cursor: pointer; font-size: 16px;"></i>
            </div>

            <div class="bottom-panel-content">
                <!-- قسم طريقة العرض -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-tv"></i> طريقة العرض</label>
                    <div class="view-tabs">
                        <button class="view-tab active" onclick="switchView('pc')">💻 PC</button>
                        <button class="view-tab" onclick="switchView('mobile')">📱 الهاتف</button>
                    </div>
                </div>

                <!-- قسم معاينة الهاتف الكاملة -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-mobile-alt"></i> معاينة الهاتف</label>
                    <div class="btn-group">
                        <button onclick="openFullscreenMobile()">📱 فتح الهاتف بالكامل</button>
                    </div>
                </div>

                <!-- قسم التحكم الأساسي -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-cube"></i> العنصر المحدد</label>
                    <input type="text" id="element-name" placeholder="اسم العنصر" readonly style="width: 100%; padding: 6px; background: #2a2f4a; border: 1px solid #00ff88; color: #fff; border-radius: 3px; margin: 4px 0; font-size: 11px;">
                </div>

                <!-- قسم الموضع والحجم (بالنسب المئوية) -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-arrows-alt"></i> الموضع والحجم (نسبي)</label>
                    <div class="slider-container">
                        <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px;">
                            <span>X (النسبة %)</span>
                            <span id="x-value">0%</span>
                        </div>
                        <input type="range" id="x-slider" min="-100" max="100" value="0" oninput="updateX(this.value)">
                    </div>
                    <div class="slider-container">
                        <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px;">
                            <span>Y (النسبة %)</span>
                            <span id="y-value">0%</span>
                        </div>
                        <input type="range" id="y-slider" min="-100" max="100" value="0" oninput="updateY(this.value)">
                    </div>
                </div>

                <!-- قسم الخيارات السريعة -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-cog"></i> خيارات سريعة</label>
                    <div class="btn-group">
                        <button onclick="togglePin()">📌 تثبيت</button>
                        <button onclick="hideElement()">👁️ إخفاء</button>
                        <button onclick="duplicateElement()">📋 نسخ</button>
                        <button onclick="moveForward()">⬆️ للأمام</button>
                        <button onclick="moveBackward()">⬇️ للخلف</button>
                        <button onclick="deleteElement()">🗑️ حذف</button>
                    </div>
                </div>

                <!-- قسم الألوان والأنماط -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-palette"></i> الألوان والأنماط</label>
                    <div class="slider-container">
                        <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px;">
                            <span>الشفافية</span>
                            <span id="opacity-value">100%</span>
                        </div>
                        <input type="range" id="opacity-slider" min="0" max="100" value="100" oninput="updateOpacity(this.value)">
                    </div>
                </div>

                <!-- قسم تحرير الصورة -->
                <div class="control-section">
                    <label class="control-label">تحرير الصورة</label>
                    <div class="slider-container">
                        <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px;">
                            <span>السطوع</span>
                            <span id="brightness-value">100%</span>
                        </div>
                        <input type="range" id="brightness" min="0" max="200" value="100" oninput="updateImageFilter()">
                    </div>
                    <div class="slider-container">
                        <div style="display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 4px;">
                            <span>التباين</span>
                            <span id="contrast-value">100%</span>
                        </div>
                        <input type="range" id="contrast" min="0" max="200" value="100" oninput="updateImageFilter()">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- زر إظهار/إخفاء الشريط السفلي -->
    <button id="toggle-bottom-btn" onclick="toggleBottomPanel()" title="إظهار/إخفاء لوحة التحرير">
        <i class="fas fa-chevron-up" id="bottom-icon"></i>
    </button>

    <!-- نافذة النسخ -->
    <div class="modal" id="templates-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📋 النسخ والقوالب</h3>
                <button class="close-modal" onclick="closeModal('templates-modal')">×</button>
            </div>
            <div id="templates-list"></div>
        </div>
    </div>

    <!-- معاينة الهاتف بملء الشاشة -->
    <div class="fullscreen-view" id="fullscreen-mobile">
        <div class="fullscreen-header">
            <h3>📱 معاينة الهاتف</h3>
            <button class="close-modal" onclick="closeFullscreenMobile()">×</button>
        </div>
        <div class="fullscreen-content">
            <iframe id="mobile-iframe" src="index.html"></iframe>
        </div>
    </div>

    <script>
        let selectedElement = null;
        let iframeDoc = null;
        let history = [];
        let historyIndex = -1;
        let deletedElements = [];
        let templates = [];
        let hasUnsavedChanges = false;
        let currentView = 'pc';
        let selectionLocked = false;

        window.addEventListener('load', () => {
            const iframe = document.getElementById('page-iframe');
            setTimeout(() => {
                try {
                    iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    setupEditor();
                    addToHistory();
                    loadTemplates();
                    updateHistoryButtons();
                } catch (e) {
                    console.error('خطأ:', e);
                }
            }, 1000);
        });

        function setupEditor() {
            if (!iframeDoc) return;
            
            iframeDoc.addEventListener('click', (e) => {
                if (selectionLocked) {
                    e.stopPropagation();
                    showNotification('⛔ التحديد مقفول حالياً');
                    return;
                }
                e.stopPropagation();
                selectElement(e.target);
            }, true);
        }

        function toggleSelectionLock() {
            selectionLocked = !selectionLocked;
            const btn = document.getElementById('lock-selection-btn');
            
            if (selectionLocked) {
                btn.classList.add('locked');
                btn.innerHTML = '<i class="fas fa-lock"></i> التحديد مقفول';
                showNotification('🔒 تم قفل التحديد - لا يمكن تعديل العناصر');
            } else {
                btn.classList.remove('locked');
                btn.innerHTML = '<i class="fas fa-lock-open"></i> تفعيل التحديد';
                showNotification('🔓 تم تفعيل التحديد - يمكنك الآن تعديل العناصر');
            }
        }

        function selectElement(el) {
            if (!el || el === iframeDoc.body || selectionLocked) return;

            if (selectedElement) {
                selectedElement.style.outline = 'none';
            }

            selectedElement = el;
            el.style.outline = '3px solid #00ff88';
            el.style.outlineOffset = '2px';

            updateSliders();
            document.getElementById('element-name').value = el.id || el.tagName;
        }

        function updateSliders() {
            if (!selectedElement) return;

            // الحصول على الموضع النسبي من الـ transform أو البيانات المخزنة
            const dataX = parseFloat(selectedElement.dataset.posX || 0);
            const dataY = parseFloat(selectedElement.dataset.posY || 0);

            document.getElementById('x-slider').value = dataX;
            document.getElementById('y-slider').value = dataY;

            document.getElementById('x-value').textContent = dataX + '%';
            document.getElementById('y-value').textContent = dataY + '%';

            // تحديث الشفافية
            const opacity = parseFloat(selectedElement.style.opacity || 1) * 100;
            document.getElementById('opacity-slider').value = opacity;
            document.getElementById('opacity-value').textContent = Math.round(opacity) + '%';
        }

        function updateX(val) {
            if (selectedElement && !selectionLocked) {
                selectedElement.dataset.posX = val;
                selectedElement.style.position = 'relative';
                selectedElement.style.left = (val * window.innerWidth / 100) + 'px';
                document.getElementById('x-value').textContent = val + '%';
                hasUnsavedChanges = true;
            }
        }

        function updateY(val) {
            if (selectedElement && !selectionLocked) {
                selectedElement.dataset.posY = val;
                selectedElement.style.position = 'relative';
                selectedElement.style.top = (val * window.innerHeight / 100) + 'px';
                document.getElementById('y-value').textContent = val + '%';
                hasUnsavedChanges = true;
            }
        }

        function updateOpacity(val) {
            if (selectedElement && !selectionLocked) {
                selectedElement.style.opacity = val / 100;
                document.getElementById('opacity-value').textContent = val + '%';
                hasUnsavedChanges = true;
            }
        }

        function updateImageFilter() {
            if (selectedElement && !selectionLocked) {
                const brightness = document.getElementById('brightness').value;
                const contrast = document.getElementById('contrast').value;
                selectedElement.style.filter = `brightness(${brightness}%) contrast(${contrast}%)`;
                document.getElementById('brightness-value').textContent = brightness + '%';
                document.getElementById('contrast-value').textContent = contrast + '%';
                hasUnsavedChanges = true;
            }
        }

        function switchView(view) {
            currentView = view;
            const frame = document.getElementById('device-frame');
            const label = document.getElementById('device-label');
            
            const btnPc = document.getElementById('btn-pc');
            const btnMobile = document.getElementById('btn-mobile');
            if(btnPc) btnPc.classList.toggle('active', view === 'pc');
            if(btnMobile) btnMobile.classList.toggle('active', view === 'mobile');
            
            const tabs = document.querySelectorAll('.view-tab');
            tabs.forEach(tab => {
                if(tab.getAttribute('onclick').includes(view)) {
                    tab.classList.add('active');
                } else {
                    tab.classList.remove('active');
                }
            });

            frame.classList.remove('pc', 'mobile');
            
            if (view === 'pc') {
                frame.classList.add('pc');
                label.textContent = 'PC - 1024x600';
                document.getElementById('view-mode').textContent = 'عرض: PC';
            } else {
                frame.classList.add('mobile');
                label.textContent = 'الهاتف - 375x667';
                document.getElementById('view-mode').textContent = 'عرض: الهاتف';
            }

            showNotification(`✓ تم التبديل إلى عرض ${view === 'pc' ? 'PC' : 'الهاتف'}`);
        }

        function toggleBottomPanel() {
            const panel = document.getElementById('bottom-panel');
            const icon = document.getElementById('bottom-icon');
            
            panel.classList.toggle('hidden');
            
            if (panel.classList.contains('hidden')) {
                icon.className = 'fas fa-chevron-down';
            } else {
                icon.className = 'fas fa-chevron-up';
            }
        }

        function openFullscreenMobile() {
            const fullscreen = document.getElementById('fullscreen-mobile');
            const mobileIframe = document.getElementById('mobile-iframe');
            
            fullscreen.classList.add('show');
            
            setTimeout(() => {
                try {
                    const mobileDoc = mobileIframe.contentDocument || mobileIframe.contentWindow.document;
                    mobileDoc.body.innerHTML = iframeDoc.body.innerHTML;
                } catch (e) {
                    console.error('خطأ:', e);
                }
            }, 500);

            showNotification('📱 تم فتح معاينة الهاتف');
        }

        function closeFullscreenMobile() {
            document.getElementById('fullscreen-mobile').classList.remove('show');
            showNotification('✓ تم إغلاق معاينة الهاتف');
        }

        function togglePin() {
            if (selectedElement && !selectionLocked) {
                selectedElement.style.cursor = selectedElement.style.cursor === 'not-allowed' ? 'pointer' : 'not-allowed';
                showNotification('📌 تم تغيير حالة التثبيت');
                hasUnsavedChanges = true;
            }
        }

        function hideElement() {
            if (selectedElement && !selectionLocked) {
                selectedElement.style.display = selectedElement.style.display === 'none' ? '' : 'none';
                showNotification('👁️ تم تغيير الرؤية');
                hasUnsavedChanges = true;
            }
        }

        function duplicateElement() {
            if (selectedElement && !selectionLocked) {
                const clone = selectedElement.cloneNode(true);
                selectedElement.parentNode.insertBefore(clone, selectedElement.nextSibling);
                showNotification('📋 تم نسخ العنصر');
                hasUnsavedChanges = true;
                addToHistory();
            }
        }

        function moveForward() {
            if (selectedElement && !selectionLocked) {
                selectedElement.style.zIndex = (parseInt(selectedElement.style.zIndex || 0) + 1);
                showNotification('⬆️ تم تحريك العنصر للأمام');
                hasUnsavedChanges = true;
            }
        }

        function moveBackward() {
            if (selectedElement && !selectionLocked) {
                selectedElement.style.zIndex = (parseInt(selectedElement.style.zIndex || 0) - 1);
                showNotification('⬇️ تم تحريك العنصر للخلف');
                hasUnsavedChanges = true;
            }
        }

        function deleteElement() {
            if (selectedElement && !selectionLocked) {
                deletedElements.push(selectedElement.cloneNode(true));
                selectedElement.remove();
                selectedElement = null;
                showNotification('🗑️ تم حذف العنصر');
                hasUnsavedChanges = true;
                addToHistory();
            }
        }

        function showAddElement() {
            showNotification('➕ إضافة عنصر جديد');
        }

        function showDeleteRecovery() {
            showNotification('🔄 استعادة العناصر المحذوفة');
        }

        function showAnimations() {
            showNotification('🎬 تحرير الحركات');
        }

        function showTextEffects() {
            showNotification('✍️ تحرير النصوص');
        }

        function showMediaEditor() {
            showNotification('🖼️ تحرير الوسائط');
        }

        function showTemplates() {
            document.getElementById('templates-modal').classList.add('show');
            showNotification('📋 النسخ والقوالب');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('show');
        }

        function saveChanges() {
            hasUnsavedChanges = false;
            showNotification('✓ تم حفظ التعديلات بنجاح');
        }

        function undoChanges() {
            if (historyIndex > 0) {
                historyIndex--;
                showNotification('↶ تم التراجع');
            }
        }

        function redoChanges() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                showNotification('↷ تم الإعادة');
            }
        }

        function addToHistory() {
            if (iframeDoc) {
                history.push(iframeDoc.body.innerHTML);
                historyIndex = history.length - 1;
                updateHistoryButtons();
            }
        }

        function updateHistoryButtons() {
            document.getElementById('undo-btn').disabled = historyIndex <= 0;
            document.getElementById('redo-btn').disabled = historyIndex >= history.length - 1;
        }

        function loadTemplates() {
            templates = [
                { name: 'قالب 1', description: 'قالب بسيط' },
                { name: 'قالب 2', description: 'قالب متقدم' }
            ];
        }

        function exitEditor() {
            if (hasUnsavedChanges) {
                if (confirm('هناك تعديلات لم يتم حفظها. هل تريد المتابعة؟')) {
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        }

        function showNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = message;
            document.body.appendChild(notif);
            
            setTimeout(() => {
                notif.remove();
            }, 3000);
        }
    </script>
</body>
</html>
