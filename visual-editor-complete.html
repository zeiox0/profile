<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر التصميم الشامل النهائي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبات Firebase و Supabase للحماية والبيانات -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="security.js"></script>
    <script src="versions-manager.js"></script>
    <script src="vibe-templates.js"></script>
    <script src="animated-backgrounds.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #fff;
            direction: rtl;
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            gap: 0;
        }

        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .preview-header {
            background: #1a1f3a;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ff88;
        }

        .toolbar {
            background: #0a0e27;
            padding: 8px 15px;
            display: flex;
            gap: 8px;
            border-bottom: 2px solid #00ff88;
            flex-wrap: wrap;
            overflow-y: auto;
            max-height: 80px;
        }

        .toolbar button {
            background: #00ff88;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            white-space: nowrap;
        }

        .toolbar button:hover {
            background: #00dd77;
            transform: scale(1.05);
        }

        .toolbar button:disabled {
            background: #888;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .toolbar button.danger {
            background: #ff4d4d;
            color: #fff;
        }

        .preview-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .device-frame {
            background: #1a1f3a;
            border: 15px solid #0a0e27;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            overflow: hidden;
            position: relative;
            max-width: 100%;
            max-height: 100%;
        }

        .device-frame.pc {
            width: 1024px;
            height: 600px;
        }

        .device-frame.mobile {
            width: 375px;
            height: 667px;
        }

        .device-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        .device-notch {
            position: absolute;
            top: 0;
            right: 50%;
            transform: translateX(50%);
            width: 150px;
            height: 25px;
            background: #0a0e27;
            border-radius: 0 0 20px 20px;
            z-index: 10;
            display: none;
        }

        .device-frame.mobile .device-notch {
            display: block;
        }

        .device-label {
            position: absolute;
            bottom: -30px;
            right: 50%;
            transform: translateX(50%);
            color: #00ff88;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        /* شريط التحرير السفلي المطور */
        .bottom-panel {
            width: 100%;
            height: 280px;
            background: #1a1f3a;
            border-top: 2px solid #00ff88;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.3s ease, height 0.3s ease;
            z-index: 100;
        }

        .bottom-panel.hidden {
            height: 0;
            transform: translateY(100%);
            border-top: none;
            overflow: hidden;
        }

        .bottom-panel-header {
            background: #0a0e27;
            padding: 12px;
            border-bottom: 2px solid #00ff88;
            font-weight: bold;
            color: #00ff88;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bottom-panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .control-section {
            background: #0a0e27;
            padding: 12px;
            border-radius: 4px;
            border-left: 3px solid #00ff88;
        }

        .control-label {
            font-size: 11px;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 8px;
            display: block;
        }

        .view-tabs {
            display: flex;
            gap: 4px;
            margin: 8px 0;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 8px;
        }

        .view-tab {
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .view-tab.active {
            color: #00ff88;
            border-bottom-color: #00ff88;
        }

        .btn-group {
            display: flex;
            gap: 4px;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .btn-group button {
            flex: 1;
            min-width: 70px;
            padding: 6px;
            background: #00ff88;
            border: none;
            color: #000;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 10px;
            transition: all 0.2s;
        }

        /* تنسيق شريط الصوت الطويل الجميل */
        .audio-control-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .audio-main-row {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        .audio-long-slider {
            flex: 1;
            height: 6px;
            background: #2a2f4a;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .audio-long-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .audio-icon-btn {
            background: none;
            border: none;
            color: #00ff88;
            font-size: 18px;
            cursor: pointer;
            position: relative;
        }

        .volume-popup {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1f3a;
            border: 1px solid #00ff88;
            padding: 10px;
            border-radius: 8px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            z-index: 1000;
        }

        .audio-icon-btn:hover .volume-popup {
            display: flex;
        }

        .vertical-slider {
            writing-mode: bt-lr; /* IE */
            -webkit-appearance: slider-vertical;
            width: 8px;
            height: 80px;
        }

        .vol-step-btn {
            background: #00ff88;
            border: none;
            color: #000;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00ff88;
            color: #000;
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
            z-index: 10001;
            font-size: 11px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #toggle-bottom-btn {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #00ff88;
            color: #000;
            border: none;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }

        #toggle-bottom-btn:hover {
            transform: scale(1.1);
            background: #00dd77;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <div class="preview-area">
            <div class="preview-header">
                <h2>🎨 محرر التصميم الشامل النهائي</h2>
                <span id="view-mode">عرض: الشاشة الأمامية</span>
            </div>

            <div class="toolbar">
                <button onclick="saveChanges()"><i class="fas fa-save"></i> حفظ</button>
                <button id="undo-btn" onclick="undoChanges()" disabled><i class="fas fa-undo"></i> تراجع</button>
                <button id="redo-btn" onclick="redoChanges()" disabled><i class="fas fa-redo"></i> إعادة</button>
                
                <button onclick="showAddElement()"><i class="fas fa-plus"></i> إضافة عنصر</button>
                <button onclick="showDeleteRecovery()"><i class="fas fa-trash"></i> حذف</button>
                <button onclick="showAnimations()"><i class="fas fa-film"></i> حركات</button>
                <button onclick="showTextEffects()"><i class="fas fa-font"></i> النصوص</button>
                <button onclick="showMediaEditor()"><i class="fas fa-image"></i> الوسائط</button>
                <button class="danger" onclick="exitEditor()"><i class="fas fa-times"></i> خروج</button>
            </div>

            <div class="preview-content">
                <div class="device-frame pc" id="device-frame">
                    <div class="device-notch"></div>
                    <iframe id="page-iframe" src="index.html"></iframe>
                    <div class="device-label" id="device-label">الشاشة الأمامية</div>
                </div>
            </div>
        </div>

        <!-- شريط التحرير السفلي المطور -->
        <div class="bottom-panel" id="bottom-panel">
            <div class="bottom-panel-header">
                <span><i class="fas fa-sliders-h"></i> التحكم والإعدادات</span>
                <i class="fas fa-times" onclick="toggleBottomPanel()" style="cursor: pointer; font-size: 16px;"></i>
            </div>

            <div class="bottom-panel-content">
                <!-- قسم طريقة العرض -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-tv"></i> طريقة العرض</label>
                    <div class="view-tabs">
                        <button class="view-tab active" id="tab-pc" onclick="switchView('pc')">💻 الشاشة الأمامية</button>
                        <button class="view-tab" id="tab-mobile" onclick="switchView('mobile')">📱 الشاشة السفلية</button>
                    </div>
                </div>

                <!-- قسم التحكم في الصوت المطور -->
                <div class="control-section" style="grid-column: span 2;">
                    <label class="control-label"><i class="fas fa-music"></i> التحكم في الصوت</label>
                    <div class="audio-control-container">
                        <div class="audio-main-row">
                            <input type="range" id="audio-progress" class="audio-long-slider" min="0" max="100" value="0" oninput="seekAudio(this.value)">
                            <div class="audio-icon-btn">
                                <i class="fas fa-volume-up" id="vol-icon"></i>
                                <div class="volume-popup">
                                    <button class="vol-step-btn" onclick="increaseEditorVolume()">+</button>
                                    <input type="range" id="editor-volume" class="vertical-slider" min="0" max="100" value="50" oninput="updateEditorVolume(this.value)">
                                    <button class="vol-step-btn" onclick="decreaseEditorVolume()">-</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- قسم التحكم الأساسي -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-cube"></i> العنصر المحدد</label>
                    <input type="text" id="element-name" placeholder="اسم العنصر" readonly style="width: 100%; padding: 6px; background: #2a2f4a; border: 1px solid #00ff88; color: #fff; border-radius: 3px; margin: 4px 0; font-size: 11px;">
                </div>

                <!-- قسم الموضع والحجم -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-arrows-alt"></i> الموضع</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="pos-x" placeholder="X" style="width: 50%; padding: 6px; background: #2a2f4a; border: 1px solid #00ff88; color: #fff; border-radius: 3px;">
                        <input type="number" id="pos-y" placeholder="Y" style="width: 50%; padding: 6px; background: #2a2f4a; border: 1px solid #00ff88; color: #fff; border-radius: 3px;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- زر إظهار/إخفاء الشريط السفلي -->
    <button id="toggle-bottom-btn" onclick="toggleBottomPanel()" title="إظهار/إخفاء لوحة التحرير">
        <i class="fas fa-chevron-up" id="bottom-icon"></i>
    </button>

    <script>
        let iframeDoc = null;
        let hasUnsavedChanges = false;
        let history = [];
        let historyIndex = -1;

        window.onload = () => {
            const iframe = document.getElementById('page-iframe');
            iframe.onload = () => {
                iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                initAudioSync();
            };
        };

        function switchView(mode) {
            const frame = document.getElementById('device-frame');
            const label = document.getElementById('device-label');
            const viewModeText = document.getElementById('view-mode');
            const tabPc = document.getElementById('tab-pc');
            const tabMobile = document.getElementById('tab-mobile');

            if (mode === 'pc') {
                frame.className = 'device-frame pc';
                label.innerText = 'الشاشة الأمامية';
                viewModeText.innerText = 'عرض: الشاشة الأمامية';
                tabPc.classList.add('active');
                tabMobile.classList.remove('active');
            } else {
                frame.className = 'device-frame mobile';
                label.innerText = 'الشاشة السفلية';
                viewModeText.innerText = 'عرض: الشاشة السفلية';
                tabMobile.classList.add('active');
                tabPc.classList.remove('active');
            }
        }

        function toggleBottomPanel() {
            const panel = document.getElementById('bottom-panel');
            const icon = document.getElementById('bottom-icon');
            panel.classList.toggle('hidden');
            if (panel.classList.contains('hidden')) {
                icon.className = 'fas fa-chevron-up';
            } else {
                icon.className = 'fas fa-chevron-down';
            }
        }

        function initAudioSync() {
            const iframe = document.getElementById('page-iframe');
            const audio = iframe.contentDocument.getElementById('main-audio');
            const progress = document.getElementById('audio-progress');
            
            if (audio) {
                audio.ontimeupdate = () => {
                    if (audio.duration) {
                        progress.value = (audio.currentTime / audio.duration) * 100;
                    }
                };
            }
        }

        function seekAudio(val) {
            const iframe = document.getElementById('page-iframe');
            const audio = iframe.contentDocument.getElementById('main-audio');
            if (audio && audio.duration) {
                audio.currentTime = (val / 100) * audio.duration;
            }
        }

        function updateEditorVolume(val) {
            const iframe = document.getElementById('page-iframe');
            const audio = iframe.contentDocument.getElementById('main-audio');
            const icon = document.getElementById('vol-icon');
            
            if (audio) audio.volume = val / 100;
            
            if (val == 0) icon.className = 'fas fa-volume-mute';
            else if (val < 50) icon.className = 'fas fa-volume-down';
            else icon.className = 'fas fa-volume-up';
        }

        function increaseEditorVolume() {
            const slider = document.getElementById('editor-volume');
            let val = Math.min(100, parseInt(slider.value) + 10);
            slider.value = val;
            updateEditorVolume(val);
        }

        function decreaseEditorVolume() {
            const slider = document.getElementById('editor-volume');
            let val = Math.max(0, parseInt(slider.value) - 10);
            slider.value = val;
            updateEditorVolume(val);
        }

        function saveChanges() {
            showNotification('✅ تم حفظ التعديلات بنجاح');
            hasUnsavedChanges = false;
        }

        function exitEditor() {
            window.location.href = 'index.html';
        }

        function showNotification(msg) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.innerText = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
    </script>
</body>
</html>
