<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر التصميم الشامل النهائي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبات Firebase و Supabase للحماية والبيانات -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="security.js"></script>
    <script src="versions-manager.js"></script>
    <script src="vibe-templates.js"></script>
    <script src="animated-backgrounds.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #fff;
            direction: rtl;
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        /* الشريط الجانبي */
        .sidebar {
            width: 280px;
            background: #1a1f3a;
            border-right: 2px solid #00ff88;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 200;
        }

        .sidebar-header {
            background: #0a0e27;
            padding: 15px;
            border-bottom: 2px solid #00ff88;
            text-align: center;
            font-weight: bold;
            color: #00ff88;
            font-size: 14px;
        }

        .sidebar-menu {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .menu-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border-right: 3px solid transparent;
            color: #888;
            font-size: 13px;
            font-weight: 500;
        }

        .menu-item:hover {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
            border-right-color: #00ff88;
        }

        .menu-item.active {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            border-right-color: #00ff88;
        }

        .menu-item i {
            font-size: 16px;
            width: 20px;
            text-align: center;
        }

        /* منطقة المحتوى الرئيسية */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .preview-header {
            background: #1a1f3a;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ff88;
        }

        .toolbar {
            background: #0a0e27;
            padding: 8px 15px;
            display: flex;
            gap: 8px;
            border-bottom: 2px solid #00ff88;
            flex-wrap: wrap;
            overflow-y: auto;
            max-height: 80px;
        }

        .toolbar button {
            background: #00ff88;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            white-space: nowrap;
        }

        .toolbar button:hover {
            background: #00dd77;
            transform: scale(1.05);
        }

        .toolbar button:disabled {
            background: #888;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .toolbar button.danger {
            background: #ff4d4d;
            color: #fff;
        }

        .preview-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .device-frame {
            background: #1a1f3a;
            border: 15px solid #0a0e27;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            overflow: hidden;
            position: relative;
            max-width: 100%;
            max-height: 100%;
        }

        .device-frame.pc {
            width: 1024px;
            height: 600px;
        }

        .device-frame.mobile {
            width: 375px;
            height: 667px;
        }

        .device-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        .device-notch {
            position: absolute;
            top: 0;
            right: 50%;
            transform: translateX(50%);
            width: 150px;
            height: 25px;
            background: #0a0e27;
            border-radius: 0 0 20px 20px;
            z-index: 10;
            display: none;
        }

        .device-frame.mobile .device-notch {
            display: block;
        }

        .device-label {
            position: absolute;
            bottom: -30px;
            right: 50%;
            transform: translateX(50%);
            color: #00ff88;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        /* شريط التحكم السفلي */
        .bottom-audio-panel {
            width: 100%;
            height: 80px;
            background: #1a1f3a;
            border-top: 2px solid #00ff88;
            display: flex;
            align-items: center;
            padding: 12px 20px;
            gap: 20px;
            z-index: 100;
        }

        .audio-control-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .audio-long-slider {
            flex: 1;
            height: 6px;
            background: #2a2f4a;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .audio-long-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .audio-icon-btn {
            background: none;
            border: none;
            color: #00ff88;
            font-size: 18px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .audio-icon-btn:hover {
            transform: scale(1.1);
        }

        .volume-popup {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1f3a;
            border: 2px solid #00ff88;
            padding: 12px;
            border-radius: 8px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            z-index: 1000;
        }

        .audio-icon-btn:hover .volume-popup {
            display: flex;
        }

        .vertical-slider {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 8px;
            height: 80px;
        }

        .vol-step-btn {
            background: #00ff88;
            border: none;
            color: #000;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .vol-step-btn:hover {
            background: #00dd77;
            transform: scale(1.05);
        }

        /* لوحة الخصائص الجانبية */
        .properties-panel {
            width: 280px;
            background: #1a1f3a;
            border-left: 2px solid #00ff88;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 200;
        }

        .properties-header {
            background: #0a0e27;
            padding: 15px;
            border-bottom: 2px solid #00ff88;
            text-align: center;
            font-weight: bold;
            color: #00ff88;
            font-size: 14px;
        }

        .properties-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .property-group {
            background: #0a0e27;
            padding: 12px;
            border-radius: 4px;
            border-left: 3px solid #00ff88;
            margin-bottom: 10px;
        }

        .property-label {
            font-size: 11px;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 8px;
            display: block;
        }

        .property-input {
            width: 100%;
            padding: 6px;
            background: #2a2f4a;
            border: 1px solid #00ff88;
            color: #fff;
            border-radius: 3px;
            font-size: 11px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00ff88;
            color: #000;
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
            z-index: 10001;
            font-size: 11px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* شريط التمرير المخصص */
        .sidebar::-webkit-scrollbar,
        .sidebar-menu::-webkit-scrollbar,
        .properties-panel::-webkit-scrollbar,
        .properties-content::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track,
        .sidebar-menu::-webkit-scrollbar-track,
        .properties-panel::-webkit-scrollbar-track,
        .properties-content::-webkit-scrollbar-track {
            background: #0a0e27;
        }

        .sidebar::-webkit-scrollbar-thumb,
        .sidebar-menu::-webkit-scrollbar-thumb,
        .properties-panel::-webkit-scrollbar-thumb,
        .properties-content::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <!-- الشريط الجانبي الأيسر -->
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-toolbox"></i> أدوات التحكم
            </div>
            <div class="sidebar-menu">
                <div class="menu-item active" id="select-tool" onclick="selectTool('select', this)">
                    <i class="fas fa-arrow-pointer"></i>
                    <span>تحديد</span>
                </div>
                <div class="menu-item" id="add-tool" onclick="selectTool('add', this)">
                    <i class="fas fa-plus"></i>
                    <span>إضافة عنصر</span>
                </div>
                <div class="menu-item" id="text-tool" onclick="selectTool('text', this)">
                    <i class="fas fa-font"></i>
                    <span>نصوص</span>
                </div>
                <div class="menu-item" id="image-tool" onclick="selectTool('image', this)">
                    <i class="fas fa-image"></i>
                    <span>الوسائط</span>
                </div>
                <div class="menu-item" id="animation-tool" onclick="selectTool('animation', this)">
                    <i class="fas fa-film"></i>
                    <span>حركات</span>
                </div>
                <div class="menu-item" id="effects-tool" onclick="selectTool('effects', this)">
                    <i class="fas fa-wand-magic-sparkles"></i>
                    <span>تأثيرات</span>
                </div>
                <div class="menu-item" id="delete-tool" onclick="selectTool('delete', this)">
                    <i class="fas fa-trash"></i>
                    <span>حذف</span>
                </div>
                <hr style="border: none; border-top: 1px solid #333; margin: 10px 0;">
                <div class="menu-item" id="undo-tool" onclick="undoChanges()">
                    <i class="fas fa-undo"></i>
                    <span>تراجع</span>
                </div>
                <div class="menu-item" id="redo-tool" onclick="redoChanges()">
                    <i class="fas fa-redo"></i>
                    <span>إعادة</span>
                </div>
                <div class="menu-item" id="save-tool" onclick="saveChanges()">
                    <i class="fas fa-save"></i>
                    <span>حفظ</span>
                </div>
            </div>
        </div>

        <!-- منطقة المحتوى الرئيسية -->
        <div class="main-content">
            <div class="preview-header">
                <h2>🎨 محرر التصميم الشامل النهائي</h2>
                <span id="view-mode">عرض: الشاشة الأمامية</span>
            </div>

            <div class="toolbar">
                <button onclick="switchView('pc')"><i class="fas fa-desktop"></i> الشاشة الأمامية</button>
                <button onclick="switchView('mobile')"><i class="fas fa-mobile-alt"></i> الشاشة السفلية</button>
            </div>

            <div class="preview-content">
                <div class="device-frame pc" id="device-frame">
                    <div class="device-notch"></div>
                    <iframe id="page-iframe" src="index.html"></iframe>
                    <div class="device-label" id="device-label">الشاشة الأمامية</div>
                </div>
            </div>

            <!-- شريط التحكم في الصوت السفلي -->
            <div class="bottom-audio-panel">
                <label style="color: #00ff88; font-size: 12px; font-weight: bold; min-width: 60px;">الصوت:</label>
                <div class="audio-control-container">
                    <input type="range" id="audio-progress" class="audio-long-slider" min="0" max="100" value="0" oninput="seekAudio(this.value)">
                    <div class="audio-icon-btn">
                        <i class="fas fa-volume-up" id="vol-icon"></i>
                        <div class="volume-popup">
                            <button class="vol-step-btn" onclick="increaseEditorVolume()">+</button>
                            <input type="range" id="editor-volume" class="vertical-slider" min="0" max="100" value="50" oninput="updateEditorVolume(this.value)">
                            <button class="vol-step-btn" onclick="decreaseEditorVolume()">-</button>
                        </div>
                    </div>
                </div>
                <button onclick="exitEditor()" style="background: #ff4d4d; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 6px;">
                    <i class="fas fa-times"></i> خروج
                </button>
            </div>
        </div>

        <!-- لوحة الخصائص اليمنى -->
        <div class="properties-panel">
            <div class="properties-header">
                <i class="fas fa-sliders-h"></i> الخصائص
            </div>
            <div class="properties-content">
                <div class="property-group">
                    <label class="property-label">اسم العنصر</label>
                    <input type="text" id="element-name" class="property-input" placeholder="اسم العنصر" readonly>
                </div>

                <div class="property-group">
                    <label class="property-label">الموضع X</label>
                    <input type="number" id="pos-x" class="property-input" placeholder="0" onchange="updateElementPosition()">
                </div>

                <div class="property-group">
                    <label class="property-label">الموضع Y</label>
                    <input type="number" id="pos-y" class="property-input" placeholder="0" onchange="updateElementPosition()">
                </div>

                <div class="property-group">
                    <label class="property-label">العرض</label>
                    <input type="number" id="width" class="property-input" placeholder="100" onchange="updateElementSize()">
                </div>

                <div class="property-group">
                    <label class="property-label">الارتفاع</label>
                    <input type="number" id="height" class="property-input" placeholder="100" onchange="updateElementSize()">
                </div>

                <div class="property-group">
                    <label class="property-label">الشفافية (%)</label>
                    <input type="range" id="opacity" class="property-input" min="0" max="100" value="100" style="padding: 0; height: 6px;" onchange="updateElementOpacity()">
                </div>

                <div class="property-group">
                    <label class="property-label">لون الخلفية</label>
                    <input type="color" id="bg-color" class="property-input" value="#ffffff" style="height: 35px; cursor: pointer;" onchange="updateElementColor()">
                </div>
            </div>
        </div>
    </div>

    <script>
        // متغيرات التحكم
        let currentTool = 'select';
        let iframeDoc = null;
        let selectedElement = null;
        let history = [];
        let historyIndex = -1;
        let hasUnsavedChanges = false;

        // تهيئة البرنامج عند التحميل
        window.onload = () => {
            const iframe = document.getElementById('page-iframe');
            iframe.onload = () => {
                iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                initAudioSync();
                addToHistory();
            };
        };

        // اختيار الأداة من الشريط الجانبي
        function selectTool(tool, element) {
            currentTool = tool;
            
            // تحديث الأيقونة النشطة
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });
            if (element) element.classList.add('active');

            // تنفيذ الإجراء المناسب
            switch(tool) {
                case 'select':
                    showNotification('✓ وضع التحديد مفعل');
                    break;
                case 'add':
                    showNotification('✨ وضع إضافة العناصر مفعل');
                    break;
                case 'text':
                    showNotification('📝 وضع تحرير النصوص مفعل');
                    break;
                case 'image':
                    showNotification('🖼️ وضع إضافة الوسائط مفعل');
                    break;
                case 'animation':
                    showNotification('🎬 وضع الحركات مفعل');
                    break;
                case 'effects':
                    showNotification('✨ وضع التأثيرات مفعل');
                    break;
                case 'delete':
                    showNotification('🗑️ وضع الحذف مفعل');
                    break;
            }
        }

        // التراجع عن التغييرات
        function undoChanges() {
            if (historyIndex > 0) {
                historyIndex--;
                restoreFromHistory();
                showNotification('↶ تم التراجع');
            } else {
                showNotification('⚠️ لا يوجد تغييرات للتراجع عنها');
            }
        }

        // إعادة التغييرات
        function redoChanges() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                restoreFromHistory();
                showNotification('↷ تم الإعادة');
            } else {
                showNotification('⚠️ لا يوجد تغييرات للإعادة');
            }
        }

        // حفظ التغييرات
        function saveChanges() {
            hasUnsavedChanges = false;
            showNotification('✅ تم حفظ التعديلات بنجاح');
            addToHistory();
        }

        // إضافة حالة للسجل
        function addToHistory() {
            if (iframeDoc) {
                history = history.slice(0, historyIndex + 1);
                history.push(iframeDoc.body.innerHTML);
                historyIndex = history.length - 1;
            }
        }

        // استعادة من السجل
        function restoreFromHistory() {
            if (history[historyIndex] && iframeDoc) {
                iframeDoc.body.innerHTML = history[historyIndex];
            }
        }

        // تحديث موضع العنصر
        function updateElementPosition() {
            if (selectedElement) {
                const x = document.getElementById('pos-x').value;
                const y = document.getElementById('pos-y').value;
                selectedElement.style.left = x + 'px';
                selectedElement.style.top = y + 'px';
                hasUnsavedChanges = true;
                showNotification('📍 تم تحديث الموضع');
            }
        }

        // تحديث حجم العنصر
        function updateElementSize() {
            if (selectedElement) {
                const width = document.getElementById('width').value;
                const height = document.getElementById('height').value;
                selectedElement.style.width = width + 'px';
                selectedElement.style.height = height + 'px';
                hasUnsavedChanges = true;
                showNotification('📐 تم تحديث الحجم');
            }
        }

        // تحديث شفافية العنصر
        function updateElementOpacity() {
            if (selectedElement) {
                const opacity = document.getElementById('opacity').value;
                selectedElement.style.opacity = opacity / 100;
                hasUnsavedChanges = true;
                showNotification('👁️ تم تحديث الشفافية');
            }
        }

        // تحديث لون العنصر
        function updateElementColor() {
            if (selectedElement) {
                const color = document.getElementById('bg-color').value;
                selectedElement.style.backgroundColor = color;
                hasUnsavedChanges = true;
                showNotification('🎨 تم تحديث اللون');
            }
        }

        // تبديل طريقة العرض
        function switchView(mode) {
            const frame = document.getElementById('device-frame');
            const label = document.getElementById('device-label');
            const viewModeText = document.getElementById('view-mode');

            if (mode === 'pc') {
                frame.className = 'device-frame pc';
                label.innerText = 'الشاشة الأمامية';
                viewModeText.innerText = 'عرض: الشاشة الأمامية';
                showNotification('💻 تم التبديل للشاشة الأمامية');
            } else {
                frame.className = 'device-frame mobile';
                label.innerText = 'الشاشة السفلية';
                viewModeText.innerText = 'عرض: الشاشة السفلية';
                showNotification('📱 تم التبديل للشاشة السفلية');
            }
        }

        // مزامنة الصوت
        function initAudioSync() {
            const iframe = document.getElementById('page-iframe');
            const audio = iframe.contentDocument.getElementById('main-audio');
            const progress = document.getElementById('audio-progress');
            
            if (audio) {
                audio.ontimeupdate = () => {
                    if (audio.duration) {
                        progress.value = (audio.currentTime / audio.duration) * 100;
                    }
                };
            }
        }

        // البحث عن الصوت
        function seekAudio(val) {
            const iframe = document.getElementById('page-iframe');
            const audio = iframe.contentDocument.getElementById('main-audio');
            if (audio && audio.duration) {
                audio.currentTime = (val / 100) * audio.duration;
            }
        }

        // تحديث مستوى الصوت
        function updateEditorVolume(val) {
            const iframe = document.getElementById('page-iframe');
            const audio = iframe.contentDocument.getElementById('main-audio');
            const icon = document.getElementById('vol-icon');
            
            if (audio) audio.volume = val / 100;
            
            if (val == 0) icon.className = 'fas fa-volume-mute';
            else if (val < 50) icon.className = 'fas fa-volume-down';
            else icon.className = 'fas fa-volume-up';
        }

        // زيادة الصوت
        function increaseEditorVolume() {
            const slider = document.getElementById('editor-volume');
            let val = Math.min(100, parseInt(slider.value) + 10);
            slider.value = val;
            updateEditorVolume(val);
            showNotification('🔊 تم زيادة الصوت');
        }

        // تقليل الصوت
        function decreaseEditorVolume() {
            const slider = document.getElementById('editor-volume');
            let val = Math.max(0, parseInt(slider.value) - 10);
            slider.value = val;
            updateEditorVolume(val);
            showNotification('🔉 تم تقليل الصوت');
        }

        // الخروج من المحرر
        function exitEditor() {
            if (hasUnsavedChanges) {
                if (confirm('هناك تعديلات لم يتم حفظها. هل تريد المتابعة؟')) {
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        }

        // عرض إشعار
        function showNotification(msg) {
            const n = document.createElement('div');
            n.className = 'notification';
            n.innerText = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }
    </script>
</body>
</html>
