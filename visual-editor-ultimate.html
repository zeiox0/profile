<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر التصميم الشامل المتقدم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #fff;
            direction: rtl;
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            height: 100vh;
            gap: 0;
            position: relative;
        }

        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .preview-header {
            background: #1a1f3a;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ff88;
            z-index: 100;
        }

        .preview-content {
            flex: 1;
            overflow: auto;
            position: relative;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .page-frame-container {
            transition: all 0.3s ease;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background: #fff;
            transform-origin: top center;
        }

        .page-frame-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* لوحة الإعدادات السفلية */
        .bottom-settings-panel {
            position: absolute;
            bottom: -300px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: #1a1f3a;
            border: 2px solid #00ff88;
            border-bottom: none;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            z-index: 1000;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }

        .bottom-settings-panel.open {
            bottom: 0;
        }

        .panel-toggle {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff88;
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 15px 15px 0 0;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 -5px 15px rgba(0,255,136,0.3);
        }

        .panel-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .device-switcher {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .device-btn {
            background: #0a0e27;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .device-btn.active {
            background: #00ff88;
            color: #000;
        }

        .zoom-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 15px;
        }

        .zoom-btn {
            background: #00ff88;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mode-switcher {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #444;
            background: #222;
            color: #888;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .mode-btn.active {
            border-color: #00ff88;
            color: #00ff88;
            background: rgba(0,255,136,0.1);
        }

        /* طبقة التحديد */
        #selection-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 500;
            display: none;
        }

        .selection-box {
            position: absolute;
            border: 2px dashed #00ff88;
            background: rgba(0, 255, 136, 0.1);
            pointer-events: none;
            transition: all 0.1s ease;
        }

        .sidebar {
            width: 350px;
            background: #1a1f3a;
            border-left: 2px solid #00ff88;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px;
            background: #0a0e27;
            border-bottom: 1px solid #333;
            color: #00ff88;
            font-weight: bold;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .control-group {
            margin-bottom: 20px;
            background: #0a0e27;
            padding: 15px;
            border-radius: 10px;
        }

        .control-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 12px;
            color: #888;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background: #1a1f3a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <!-- منطقة المعاينة -->
        <div class="preview-area">
            <div class="preview-header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <h2 style="font-size: 16px; color: #00ff88;"><i class="fas fa-magic"></i> محرر التصميم الذكي</h2>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="saveChanges()" style="background: #00ff88; color: #000; border: none; padding: 8px 20px; border-radius: 5px; font-weight: bold; cursor: pointer;">
                        <i class="fas fa-save"></i> حفظ التعديلات
                    </button>
                    <button onclick="window.location.href='admin.html'" style="background: #ff4d4d; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">
                        <i class="fas fa-times"></i> خروج
                    </button>
                </div>
            </div>

            <div class="preview-content" id="preview-content">
                <div id="selection-overlay">
                    <div class="selection-box" id="selection-box"></div>
                </div>
                <div class="page-frame-container" id="page-frame-container" style="width: 100%; height: 100%;">
                    <iframe src="index.html" id="preview-iframe"></iframe>
                </div>
            </div>

            <!-- لوحة الإعدادات السفلية -->
            <div class="bottom-settings-panel" id="bottom-panel">
                <button class="panel-toggle" onclick="toggleBottomPanel()">
                    <i class="fas fa-cog"></i> الإعدادات
                </button>
                
                <div class="panel-content">
                    <!-- أزرار الأجهزة في الأعلى -->
                    <div class="device-switcher">
                        <button class="device-btn active" onclick="setDevice('pc', this)">
                            <i class="fas fa-desktop"></i> PC
                        </button>
                        <button class="device-btn" onclick="setDevice('phone', this)">
                            <i class="fas fa-mobile-alt"></i> Phone
                        </button>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <!-- التحكم في التكبير -->
                        <div class="zoom-controls">
                            <span style="font-size: 12px; color: #888;">التكبير:</span>
                            <button class="zoom-btn" onclick="adjustZoom(-0.1)"><i class="fas fa-minus"></i></button>
                            <span id="zoom-level" style="font-weight: bold; min-width: 50px; text-align: center;">100%</span>
                            <button class="zoom-btn" onclick="adjustZoom(0.1)"><i class="fas fa-plus"></i></button>
                            <button onclick="resetZoom()" style="background: none; border: 1px solid #444; color: #888; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 10px;">إعادة</button>
                        </div>

                        <!-- تبديل الأوضاع -->
                        <div class="mode-switcher">
                            <button class="mode-btn active" id="btn-select-mode" onclick="setMode('select')">
                                <i class="fas fa-mouse-pointer"></i> وضع التحديد
                            </button>
                            <button class="mode-btn" id="btn-preview-mode" onclick="setMode('preview')">
                                <i class="fas fa-eye"></i> وضع العرض
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- القائمة الجانبية للتعديل -->
        <div class="sidebar">
            <div class="sidebar-header">خصائص العنصر</div>
            <div class="sidebar-content" id="sidebar-content">
                <div style="text-align: center; padding: 40px; color: #666;">
                    <i class="fas fa-mouse-pointer fa-3x" style="margin-bottom: 15px; opacity: 0.3;"></i>
                    <p>قم بتفعيل "وضع التحديد" واضغط على أي عنصر في الصفحة لتعديله</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentZoom = 1;
        let currentMode = 'select';
        let selectedElement = null;
        const iframe = document.getElementById('preview-iframe');
        const frameContainer = document.getElementById('page-frame-container');
        const selectionOverlay = document.getElementById('selection-overlay');
        const selectionBox = document.getElementById('selection-box');

        function toggleBottomPanel() {
            document.getElementById('bottom-panel').classList.toggle('open');
        }

        function setDevice(device, btn) {
            document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (device === 'phone') {
                frameContainer.style.width = '375px';
                frameContainer.style.height = '667px';
                frameContainer.style.borderRadius = '30px';
                frameContainer.style.border = '10px solid #333';
            } else {
                frameContainer.style.width = '100%';
                frameContainer.style.height = '100%';
                frameContainer.style.borderRadius = '0';
                frameContainer.style.border = 'none';
            }
            updateSelectionBox();
        }

        function adjustZoom(delta) {
            currentZoom = Math.max(0.5, Math.min(2, currentZoom + delta));
            updateZoom();
        }

        function resetZoom() {
            currentZoom = 1;
            updateZoom();
        }

        function updateZoom() {
            frameContainer.style.transform = `scale(${currentZoom})`;
            document.getElementById('zoom-level').innerText = Math.round(currentZoom * 100) + '%';
            updateSelectionBox();
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}-mode`).classList.add('active');

            if (mode === 'select') {
                selectionOverlay.style.display = 'block';
                iframe.style.pointerEvents = 'none';
            } else {
                selectionOverlay.style.display = 'none';
                iframe.style.pointerEvents = 'auto';
                selectedElement = null;
                document.getElementById('sidebar-content').innerHTML = '<div style="text-align: center; padding: 40px; color: #666;"><p>وضع العرض مفعل. يمكنك التفاعل مع الصفحة الآن.</p></div>';
            }
        }

        // منطق التحديد
        iframe.onload = function() {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            
            // إضافة مستمع للأحداث في منطقة المعاينة (فوق الـ iframe)
            document.getElementById('preview-content').addEventListener('mousemove', (e) => {
                if (currentMode !== 'select') return;
                
                const rect = iframe.getBoundingClientRect();
                const x = (e.clientX - rect.left) / currentZoom;
                const y = (e.clientY - rect.top) / currentZoom;
                
                const el = doc.elementFromPoint(x, y);
                if (el && el !== doc.body && el !== doc.documentElement) {
                    highlightElement(el);
                }
            });

            document.getElementById('preview-content').addEventListener('click', (e) => {
                if (currentMode !== 'select') return;
                
                const rect = iframe.getBoundingClientRect();
                const x = (e.clientX - rect.left) / currentZoom;
                const y = (e.clientY - rect.top) / currentZoom;
                
                const el = doc.elementFromPoint(x, y);
                if (el && el !== doc.body && el !== doc.documentElement) {
                    selectElement(el);
                }
            });
        };

        function highlightElement(el) {
            const rect = el.getBoundingClientRect();
            const frameRect = iframe.getBoundingClientRect();
            
            selectionBox.style.width = rect.width + 'px';
            selectionBox.style.height = rect.height + 'px';
            selectionBox.style.left = (rect.left * currentZoom) + 'px';
            selectionBox.style.top = (rect.top * currentZoom) + 'px';
            selectionOverlay.style.display = 'block';
        }

        function selectElement(el) {
            selectedElement = el;
            const sidebar = document.getElementById('sidebar-content');
            
            let html = `
                <div class="control-group">
                    <label>نوع العنصر: <span style="color:#00ff88">${el.tagName}</span></label>
                </div>
            `;

            if (el.innerText && el.children.length === 0) {
                html += `
                    <div class="control-group">
                        <label>النص:</label>
                        <textarea oninput="updateText(this.value)" style="width:100%; background:#1a1f3a; color:#fff; border:1px solid #333; padding:10px; border-radius:5px;">${el.innerText}</textarea>
                    </div>
                `;
            }

            html += `
                <div class="control-group">
                    <label>لون النص:</label>
                    <input type="color" value="${rgbToHex(window.getComputedStyle(el).color)}" oninput="updateStyle('color', this.value)">
                </div>
                <div class="control-group">
                    <label>حجم الخط (px):</label>
                    <input type="number" value="${parseInt(window.getComputedStyle(el).fontSize)}" oninput="updateStyle('fontSize', this.value + 'px')">
                </div>
            `;

            sidebar.innerHTML = html;
        }

        function updateText(val) {
            if (selectedElement) selectedElement.innerText = val;
        }

        function updateStyle(prop, val) {
            if (selectedElement) selectedElement.style[prop] = val;
        }

        function rgbToHex(rgb) {
            if (!rgb) return '#000000';
            const res = rgb.match(/\d+/g);
            if (!res) return '#000000';
            return "#" + res.slice(0,3).map(x => {
                const hex = parseInt(x).toString(16);
                return hex.length === 1 ? "0" + hex : hex;
            }).join("");
        }

        function updateSelectionBox() {
            if (selectedElement) highlightElement(selectedElement);
        }

        function saveChanges() {
            alert("تم حفظ التعديلات بنجاح (محاكاة)!");
        }

        // تفعيل وضع التحديد افتراضياً
        setMode('select');
    </script>
</body>
</html>
