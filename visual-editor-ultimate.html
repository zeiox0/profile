<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر التصميم الشامل المتقدم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #fff;
            direction: rtl;
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            height: 100vh;
            gap: 0;
        }

        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .preview-header {
            background: #1a1f3a;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ff88;
        }

        .toolbar {
            background: #0a0e27;
            padding: 8px 15px;
            display: flex;
            gap: 8px;
            border-bottom: 2px solid #00ff88;
            flex-wrap: wrap;
            overflow-y: auto;
            max-height: 80px;
        }

        .toolbar button {
            background: #00ff88;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            white-space: nowrap;
        }

        .toolbar button:hover {
            background: #00dd77;
            transform: scale(1.05);
        }

        .toolbar button.danger {
            background: #ff4d4d;
            color: #fff;
        }

        .preview-content {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .page-frame {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .page-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .sidebar {
            width: 400px;
            background: #1a1f3a;
            border-left: 2px solid #00ff88;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            background: #0a0e27;
            padding: 12px;
            border-bottom: 2px solid #00ff88;
            font-weight: bold;
            color: #00ff88;
            font-size: 13px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .control-section {
            background: #0a0e27;
            padding: 12px;
            margin: 8px 0;
            border-radius: 4px;
            border-left: 3px solid #00ff88;
        }

        .control-label {
            font-size: 11px;
            font-weight: bold;
            color: #00ff88;
            margin-bottom: 8px;
            display: block;
        }

        .slider-container {
            margin-bottom: 12px;
        }

        .slider-value {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-bottom: 4px;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: #2a2f4a;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #00ff88;
            cursor: pointer;
            border: none;
        }

        .btn-group {
            display: flex;
            gap: 4px;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .btn-group button {
            flex: 1;
            min-width: 70px;
            padding: 6px;
            background: #00ff88;
            border: none;
            color: #000;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 10px;
            transition: all 0.2s;
        }

        .btn-group button:hover {
            background: #00dd77;
        }

        .btn-group button.active {
            background: #ff4d4d;
        }

        select, input[type="text"], input[type="number"], input[type="color"] {
            width: 100%;
            padding: 6px;
            background: #2a2f4a;
            border: 1px solid #00ff88;
            color: #fff;
            border-radius: 3px;
            margin: 4px 0;
            font-size: 11px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00ff88;
            color: #000;
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
            z-index: 10001;
            font-size: 11px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 5000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #1a1f3a;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #00ff88;
            max-width: 700px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 10px;
        }

        .modal-header h3 {
            color: #00ff88;
            font-size: 14px;
        }

        .close-modal {
            background: #ff4d4d;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .shape-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin: 8px 0;
        }

        .shape-btn {
            padding: 8px;
            background: #2a2f4a;
            border: 2px solid #00ff88;
            color: #00ff88;
            cursor: pointer;
            border-radius: 3px;
            font-size: 10px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .shape-btn:hover,
        .shape-btn.active {
            background: #00ff88;
            color: #000;
        }

        .animation-preview {
            width: 100%;
            height: 100px;
            background: #2a2f4a;
            border: 1px solid #00ff88;
            border-radius: 4px;
            margin: 8px 0;
            position: relative;
            overflow: hidden;
        }

        .preview-element {
            position: absolute;
            width: 40px;
            height: 40px;
            background: #00ff88;
            border-radius: 4px;
            top: 30px;
            right: 20px;
        }

        .sidebar-content::-webkit-scrollbar,
        .modal-content::-webkit-scrollbar,
        .toolbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .sidebar-content::-webkit-scrollbar-track,
        .modal-content::-webkit-scrollbar-track,
        .toolbar::-webkit-scrollbar-track {
            background: #0a0e27;
        }

        .sidebar-content::-webkit-scrollbar-thumb,
        .modal-content::-webkit-scrollbar-thumb,
        .toolbar::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 3px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin: 8px 0;
            border-bottom: 2px solid #00ff88;
            padding-bottom: 8px;
        }

        .tab-btn {
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: #888;
            cursor: pointer;
            font-weight: bold;
            font-size: 11px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #00ff88;
            border-bottom-color: #00ff88;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <div class="preview-area">
            <div class="preview-header">
                <h2>🎨 محرر التصميم الشامل</h2>
                <span id="element-count">العناصر: 0</span>
            </div>

            <div class="toolbar">
                <button onclick="saveChanges()"><i class="fas fa-save"></i> حفظ</button>
                <button onclick="undoChanges()"><i class="fas fa-undo"></i> تراجع</button>
                <button onclick="redoChanges()"><i class="fas fa-redo"></i> إعادة</button>
                <button onclick="showAddElement()"><i class="fas fa-plus"></i> إضافة عنصر</button>
                <button onclick="showDeleteRecovery()"><i class="fas fa-trash"></i> حذف</button>
                <button onclick="showAnimations()"><i class="fas fa-film"></i> حركات</button>
                <button onclick="showTextEffects()"><i class="fas fa-font"></i> النصوص</button>
                <button onclick="showMediaEditor()"><i class="fas fa-image"></i> الوسائط</button>
                <button onclick="showTemplates()"><i class="fas fa-copy"></i> النسخ</button>
                <button class="danger" onclick="exitEditor()"><i class="fas fa-times"></i> خروج</button>
            </div>

            <div class="preview-content">
                <div class="page-frame">
                    <iframe id="page-iframe" src="index.html"></iframe>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-sliders-h"></i> التحكم والإعدادات
            </div>

            <div class="sidebar-content">
                <!-- قسم التحكم الأساسي -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-cube"></i> العنصر المحدد</label>
                    <input type="text" id="element-name" placeholder="اسم العنصر" readonly>
                </div>

                <!-- قسم الموضع والحجم -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-arrows-alt"></i> الموضع والحجم</label>
                    <div class="grid-2">
                        <div>
                            <label style="font-size: 10px; color: #888;">X</label>
                            <input type="range" id="x-slider" min="-500" max="500" value="0" oninput="updateX(this.value)">
                            <span id="x-value" style="font-size: 10px;">0px</span>
                        </div>
                        <div>
                            <label style="font-size: 10px; color: #888;">Y</label>
                            <input type="range" id="y-slider" min="-500" max="500" value="0" oninput="updateY(this.value)">
                            <span id="y-value" style="font-size: 10px;">0px</span>
                        </div>
                    </div>
                    <div class="grid-2">
                        <div>
                            <label style="font-size: 10px; color: #888;">التكبير</label>
                            <input type="range" id="scale-slider" min="50" max="200" value="100" oninput="updateScale(this.value)">
                            <span id="scale-value" style="font-size: 10px;">100%</span>
                        </div>
                        <div>
                            <label style="font-size: 10px; color: #888;">الشفافية</label>
                            <input type="range" id="opacity-slider" min="0" max="100" value="100" oninput="updateOpacity(this.value)">
                            <span id="opacity-value" style="font-size: 10px;">100%</span>
                        </div>
                    </div>
                </div>

                <!-- قسم الألوان والتأثيرات -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-palette"></i> الألوان والتأثيرات</label>
                    <div class="grid-2">
                        <div>
                            <label style="font-size: 10px; color: #888;">اللون</label>
                            <input type="color" id="color-picker" value="#00ff88" oninput="updateColor(this.value)">
                        </div>
                        <div>
                            <label style="font-size: 10px; color: #888;">التشبع</label>
                            <input type="range" id="saturation-slider" min="0" max="200" value="100" oninput="updateSaturation(this.value)">
                        </div>
                    </div>
                    <div class="grid-2">
                        <div>
                            <label style="font-size: 10px; color: #888;">الظل</label>
                            <input type="range" id="shadow-slider" min="0" max="20" value="0" oninput="updateShadow(this.value)">
                        </div>
                        <div>
                            <label style="font-size: 10px; color: #888;">التدوير</label>
                            <input type="range" id="rotation-slider" min="0" max="360" value="0" oninput="updateRotation(this.value)">
                        </div>
                    </div>
                </div>

                <!-- قسم شكل الصور -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-shapes"></i> شكل الصورة</label>
                    <div class="shape-selector">
                        <button class="shape-btn active" onclick="setShape('square')">📦 مربع</button>
                        <button class="shape-btn" onclick="setShape('circle')">⭕ دائرة</button>
                        <button class="shape-btn" onclick="setShape('rounded')">🔲 مستدير</button>
                        <button class="shape-btn" onclick="setShape('triangle')">△ مثلث</button>
                    </div>
                </div>

                <!-- قسم الخيارات السريعة -->
                <div class="control-section">
                    <label class="control-label"><i class="fas fa-cog"></i> الخيارات</label>
                    <div class="btn-group">
                        <button onclick="togglePin()">📌 تثبيت</button>
                        <button onclick="hideElement()">👁️ إخفاء</button>
                        <button onclick="duplicateElement()">📋 نسخ</button>
                    </div>
                    <div class="btn-group">
                        <button onclick="bringToFront()">⬆️ للأمام</button>
                        <button onclick="sendToBack()">⬇️ للخلف</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة إضافة عنصر -->
    <div class="modal" id="add-element-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>➕ إضافة عنصر جديد</h3>
                <button class="close-modal" onclick="closeModal('add-element-modal')">×</button>
            </div>
            <div class="btn-group">
                <button onclick="addElement('text')">📝 نص</button>
                <button onclick="addElement('image')">🖼️ صورة</button>
                <button onclick="addElement('video')">🎬 فيديو</button>
                <button onclick="addElement('shape')">🔷 شكل</button>
            </div>
        </div>
    </div>

    <!-- نافذة الحذف والاستعادة -->
    <div class="modal" id="delete-recovery-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🗑️ الحذف والاستعادة</h3>
                <button class="close-modal" onclick="closeModal('delete-recovery-modal')">×</button>
            </div>
            <div class="control-section">
                <label class="control-label">العناصر المحذوفة</label>
                <div id="deleted-items-list"></div>
            </div>
        </div>
    </div>

    <!-- نافذة الحركات -->
    <div class="modal" id="animations-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🎬 الحركات والتأثيرات</h3>
                <button class="close-modal" onclick="closeModal('animations-modal')">×</button>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('animations', 'preset')">الحركات المسبقة</button>
                <button class="tab-btn" onclick="switchTab('animations', 'custom')">رسم مخصص</button>
            </div>
            <div id="preset-animations" class="tab-content active">
                <div class="btn-group">
                    <button onclick="addAnimation('fadeIn')">👻 ظهور تدريجي</button>
                    <button onclick="addAnimation('slideIn')">➡️ انزلاق</button>
                    <button onclick="addAnimation('bounce')">⛹️ ارتداد</button>
                    <button onclick="addAnimation('rotate')">🔄 دوران</button>
                    <button onclick="addAnimation('scale')">📈 تكبير</button>
                    <button onclick="addAnimation('flip')">🔀 قلب</button>
                    <button onclick="addAnimation('shake')">📳 اهتزاز</button>
                    <button onclick="addAnimation('pulse')">💫 نبض</button>
                </div>
            </div>
            <div id="custom-animations" class="tab-content">
                <label class="control-label">رسم المسار المخصص</label>
                <div class="animation-preview" id="animation-canvas"></div>
                <div class="btn-group">
                    <button onclick="startDrawing()">✏️ ابدأ الرسم</button>
                    <button onclick="clearDrawing()">🗑️ امسح</button>
                    <button onclick="applyCustomAnimation()">✓ تطبيق</button>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة تأثيرات النص -->
    <div class="modal" id="text-effects-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📝 تأثيرات النص والخطوط</h3>
                <button class="close-modal" onclick="closeModal('text-effects-modal')">×</button>
            </div>
            <div class="control-section">
                <label class="control-label">نوع الخط</label>
                <select id="font-family" onchange="updateFont()">
                    <option value="Arial">Arial</option>
                    <option value="Times New Roman">Times New Roman</option>
                    <option value="Courier New">Courier New</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Verdana">Verdana</option>
                    <option value="Comic Sans MS">Comic Sans MS</option>
                </select>
            </div>
            <div class="control-section">
                <label class="control-label">حجم الخط</label>
                <input type="range" id="font-size" min="10" max="100" value="16" oninput="updateFontSize(this.value)">
                <span id="font-size-value" style="font-size: 10px;">16px</span>
            </div>
            <div class="control-section">
                <label class="control-label">تأثيرات الظهور</label>
                <div class="btn-group">
                    <button onclick="addTextEffect('typewriter')">⌨️ كتابة</button>
                    <button onclick="addTextEffect('fadeIn')">👻 ظهور</button>
                    <button onclick="addTextEffect('slideRight')">➡️ من اليسار</button>
                    <button onclick="addTextEffect('slideLeft')">⬅️ من اليمين</button>
                    <button onclick="addTextEffect('popIn')">💥 ظهور مفاجئ</button>
                </div>
            </div>
            <div class="control-section">
                <label class="control-label">التطبيق على</label>
                <div class="btn-group">
                    <button onclick="setTextScope('all')">📄 الصفحة كاملة</button>
                    <button onclick="setTextScope('selected')">🔍 العنصر المحدد</button>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة محرر الوسائط -->
    <div class="modal" id="media-editor-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🎨 محرر الوسائط</h3>
                <button class="close-modal" onclick="closeModal('media-editor-modal')">×</button>
            </div>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('media', 'images')">الصور</button>
                <button class="tab-btn" onclick="switchTab('media', 'videos')">الفيديوهات</button>
                <button class="tab-btn" onclick="switchTab('media', 'audio')">الأصوات</button>
            </div>
            <div id="images-tab" class="tab-content active">
                <label class="control-label">تحرير الصورة</label>
                <div class="grid-2">
                    <div>
                        <label style="font-size: 10px; color: #888;">السطوع</label>
                        <input type="range" id="brightness" min="0" max="200" value="100" oninput="updateImageFilter()">
                    </div>
                    <div>
                        <label style="font-size: 10px; color: #888;">التباين</label>
                        <input type="range" id="contrast" min="0" max="200" value="100" oninput="updateImageFilter()">
                    </div>
                </div>
                <div class="grid-2">
                    <div>
                        <label style="font-size: 10px; color: #888;">التشبع</label>
                        <input type="range" id="saturate" min="0" max="200" value="100" oninput="updateImageFilter()">
                    </div>
                    <div>
                        <label style="font-size: 10px; color: #888;">التمويه</label>
                        <input type="range" id="blur" min="0" max="20" value="0" oninput="updateImageFilter()">
                    </div>
                </div>
            </div>
            <div id="videos-tab" class="tab-content">
                <label class="control-label">تحرير الفيديو</label>
                <div class="grid-2">
                    <div>
                        <label style="font-size: 10px; color: #888;">السرعة</label>
                        <input type="range" id="video-speed" min="0.5" max="2" step="0.1" value="1" oninput="updateVideoSpeed()">
                    </div>
                    <div>
                        <label style="font-size: 10px; color: #888;">مستوى الصوت</label>
                        <input type="range" id="video-volume" min="0" max="100" value="100" oninput="updateVideoVolume()">
                    </div>
                </div>
            </div>
            <div id="audio-tab" class="tab-content">
                <label class="control-label">تحرير الصوت</label>
                <div class="grid-2">
                    <div>
                        <label style="font-size: 10px; color: #888;">مستوى الصوت</label>
                        <input type="range" id="audio-volume" min="0" max="100" value="100" oninput="updateAudioVolume()">
                    </div>
                    <div>
                        <label style="font-size: 10px; color: #888;">السرعة</label>
                        <input type="range" id="audio-speed" min="0.5" max="2" step="0.1" value="1" oninput="updateAudioSpeed()">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- نافذة النسخ -->
    <div class="modal" id="templates-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📋 النسخ والقوالب</h3>
                <button class="close-modal" onclick="closeModal('templates-modal')">×</button>
            </div>
            <div id="templates-list"></div>
        </div>
    </div>

    <script>
        let selectedElement = null;
        let iframeDoc = null;
        let history = [];
        let historyIndex = -1;
        let deletedElements = [];
        let templates = [];
        let hasUnsavedChanges = false;
        let isDrawing = false;
        let drawingCanvas = null;

        window.addEventListener('load', () => {
            const iframe = document.getElementById('page-iframe');
            setTimeout(() => {
                try {
                    iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                    setupEditor();
                    addToHistory();
                    loadTemplates();
                } catch (e) {
                    console.error('خطأ:', e);
                }
            }, 1000);
        });

        function setupEditor() {
            if (!iframeDoc) return;
            
            iframeDoc.addEventListener('click', (e) => {
                e.stopPropagation();
                selectElement(e.target);
            }, true);

            updateElementCount();
        }

        function selectElement(el) {
            if (!el || el === iframeDoc.body) return;

            if (selectedElement) {
                selectedElement.style.outline = 'none';
            }

            selectedElement = el;
            el.style.outline = '3px solid #00ff88';
            el.style.outlineOffset = '2px';

            updateSliders();
            document.getElementById('element-name').value = el.id || el.tagName;
        }

        function updateSliders() {
            if (!selectedElement) return;

            const x = parseInt(selectedElement.style.left || 0);
            const y = parseInt(selectedElement.style.top || 0);
            const scale = parseInt(selectedElement.style.transform?.match(/\d+/)?.[0] || 100);
            const opacity = parseInt(selectedElement.style.opacity * 100 || 100);

            document.getElementById('x-slider').value = x;
            document.getElementById('y-slider').value = y;
            document.getElementById('scale-slider').value = scale;
            document.getElementById('opacity-slider').value = opacity;

            document.getElementById('x-value').textContent = x + 'px';
            document.getElementById('y-value').textContent = y + 'px';
            document.getElementById('scale-value').textContent = scale + '%';
            document.getElementById('opacity-value').textContent = opacity + '%';
        }

        function updateX(val) {
            if (selectedElement) {
                selectedElement.style.position = 'relative';
                selectedElement.style.left = val + 'px';
                document.getElementById('x-value').textContent = val + 'px';
                hasUnsavedChanges = true;
            }
        }

        function updateY(val) {
            if (selectedElement) {
                selectedElement.style.position = 'relative';
                selectedElement.style.top = val + 'px';
                document.getElementById('y-value').textContent = val + 'px';
                hasUnsavedChanges = true;
            }
        }

        function updateScale(val) {
            if (selectedElement) {
                selectedElement.style.transform = `scale(${val / 100})`;
                document.getElementById('scale-value').textContent = val + '%';
                hasUnsavedChanges = true;
            }
        }

        function updateOpacity(val) {
            if (selectedElement) {
                selectedElement.style.opacity = val / 100;
                document.getElementById('opacity-value').textContent = val + '%';
                hasUnsavedChanges = true;
            }
        }

        function updateColor(val) {
            if (selectedElement) {
                selectedElement.style.color = val;
                hasUnsavedChanges = true;
            }
        }

        function updateSaturation(val) {
            if (selectedElement) {
                selectedElement.style.filter = `saturate(${val / 100})`;
                hasUnsavedChanges = true;
            }
        }

        function updateShadow(val) {
            if (selectedElement) {
                selectedElement.style.boxShadow = `0 0 ${val}px rgba(0, 255, 136, 0.5)`;
                hasUnsavedChanges = true;
            }
        }

        function updateRotation(val) {
            if (selectedElement) {
                selectedElement.style.transform = `rotate(${val}deg)`;
                hasUnsavedChanges = true;
            }
        }

        function setShape(shape) {
            if (!selectedElement) return;

            document.querySelectorAll('.shape-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            switch(shape) {
                case 'circle':
                    selectedElement.style.borderRadius = '50%';
                    break;
                case 'rounded':
                    selectedElement.style.borderRadius = '15px';
                    break;
                case 'triangle':
                    selectedElement.style.clipPath = 'polygon(50% 0%, 0% 100%, 100% 100%)';
                    break;
                default:
                    selectedElement.style.borderRadius = '0';
            }

            hasUnsavedChanges = true;
            showNotification('✓ تم تغيير الشكل');
        }

        function togglePin() {
            if (selectedElement) {
                selectedElement.style.cursor = selectedElement.style.cursor === 'not-allowed' ? 'pointer' : 'not-allowed';
                showNotification('📌 تم تغيير حالة التثبيت');
                hasUnsavedChanges = true;
            }
        }

        function hideElement() {
            if (selectedElement) {
                selectedElement.style.display = selectedElement.style.display === 'none' ? '' : 'none';
                showNotification('👁️ تم تغيير الرؤية');
                hasUnsavedChanges = true;
            }
        }

        function duplicateElement() {
            if (selectedElement) {
                const clone = selectedElement.cloneNode(true);
                clone.style.left = (parseInt(clone.style.left || 0) + 20) + 'px';
                clone.style.top = (parseInt(clone.style.top || 0) + 20) + 'px';
                selectedElement.parentNode.insertBefore(clone, selectedElement.nextSibling);
                showNotification('📋 تم نسخ العنصر');
                addToHistory();
                hasUnsavedChanges = true;
            }
        }

        function bringToFront() {
            if (selectedElement) {
                selectedElement.style.zIndex = '9999';
                showNotification('⬆️ تم النقل للأمام');
                hasUnsavedChanges = true;
            }
        }

        function sendToBack() {
            if (selectedElement) {
                selectedElement.style.zIndex = '1';
                showNotification('⬇️ تم النقل للخلف');
                hasUnsavedChanges = true;
            }
        }

        function showAddElement() {
            document.getElementById('add-element-modal').classList.add('show');
        }

        function addElement(type) {
            if (!iframeDoc) return;

            let el;
            switch(type) {
                case 'text':
                    el = iframeDoc.createElement('p');
                    el.textContent = 'نص جديد';
                    el.style.color = '#00ff88';
                    break;
                case 'image':
                    el = iframeDoc.createElement('img');
                    el.src = 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%2300ff88%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E';
                    break;
                case 'video':
                    el = iframeDoc.createElement('video');
                    el.controls = true;
                    el.style.width = '200px';
                    el.style.height = '150px';
                    break;
                case 'shape':
                    el = iframeDoc.createElement('div');
                    el.style.width = '100px';
                    el.style.height = '100px';
                    el.style.background = '#00ff88';
                    break;
            }

            el.style.position = 'relative';
            el.style.margin = '10px';
            el.id = type + '_' + Date.now();

            iframeDoc.body.appendChild(el);
            selectElement(el);
            closeModal('add-element-modal');
            addToHistory();
            showNotification('✓ تم إضافة عنصر جديد');
            hasUnsavedChanges = true;
        }

        function showDeleteRecovery() {
            const list = document.getElementById('deleted-items-list');
            if (deletedElements.length === 0) {
                list.innerHTML = '<p style="color: #888;">لا توجد عناصر محذوفة</p>';
            } else {
                list.innerHTML = deletedElements.map((item, idx) => `
                    <div style="background: #0a0e27; padding: 8px; margin: 4px 0; border-radius: 3px; display: flex; justify-content: space-between; align-items: center;">
                        <span>${item.name}</span>
                        <button onclick="recoverElement(${idx})" style="padding: 4px 8px; background: #00ff88; border: none; border-radius: 3px; cursor: pointer; color: #000; font-weight: bold; font-size: 10px;">استعادة</button>
                    </div>
                `).join('');
            }
            document.getElementById('delete-recovery-modal').classList.add('show');
        }

        function recoverElement(idx) {
            const item = deletedElements[idx];
            const el = iframeDoc.createElement(item.tag);
            el.innerHTML = item.html;
            el.id = item.id;
            iframeDoc.body.appendChild(el);
            deletedElements.splice(idx, 1);
            showDeleteRecovery();
            showNotification('✓ تم استعادة العنصر');
            addToHistory();
        }

        function showAnimations() {
            document.getElementById('animations-modal').classList.add('show');
        }

        function addAnimation(type) {
            if (!selectedElement) return;

            const animations = {
                'fadeIn': 'animation: fadeIn 1s ease-in;',
                'slideIn': 'animation: slideIn 1s ease-out;',
                'bounce': 'animation: bounce 1s ease-in-out;',
                'rotate': 'animation: rotate 2s linear infinite;',
                'scale': 'animation: scale 1s ease-in-out;',
                'flip': 'animation: flip 1s ease-in-out;',
                'shake': 'animation: shake 0.5s ease-in-out;',
                'pulse': 'animation: pulse 1.5s ease-in-out infinite;'
            };

            if (animations[type]) {
                selectedElement.style.cssText += animations[type];
                showNotification(`✓ تم إضافة حركة: ${type}`);
                hasUnsavedChanges = true;
            }
        }

        function showTextEffects() {
            document.getElementById('text-effects-modal').classList.add('show');
        }

        function updateFont() {
            if (selectedElement) {
                selectedElement.style.fontFamily = document.getElementById('font-family').value;
                hasUnsavedChanges = true;
            }
        }

        function updateFontSize(val) {
            if (selectedElement) {
                selectedElement.style.fontSize = val + 'px';
                document.getElementById('font-size-value').textContent = val + 'px';
                hasUnsavedChanges = true;
            }
        }

        function addTextEffect(type) {
            if (!selectedElement) return;

            const effects = {
                'typewriter': 'تأثير الكتابة',
                'fadeIn': 'ظهور تدريجي',
                'slideRight': 'انزلاق من اليسار',
                'slideLeft': 'انزلاق من اليمين',
                'popIn': 'ظهور مفاجئ'
            };

            selectedElement.style.animation = type + ' 1s ease-in-out';
            showNotification(`✓ تم إضافة تأثير: ${effects[type]}`);
            hasUnsavedChanges = true;
        }

        function setTextScope(scope) {
            showNotification(`✓ تم تعيين النطاق: ${scope === 'all' ? 'الصفحة كاملة' : 'العنصر المحدد'}`);
        }

        function showMediaEditor() {
            document.getElementById('media-editor-modal').classList.add('show');
        }

        function updateImageFilter() {
            if (!selectedElement) return;

            const brightness = document.getElementById('brightness').value;
            const contrast = document.getElementById('contrast').value;
            const saturate = document.getElementById('saturate').value;
            const blur = document.getElementById('blur').value;

            selectedElement.style.filter = `brightness(${brightness}%) contrast(${contrast}%) saturate(${saturate}%) blur(${blur}px)`;
            hasUnsavedChanges = true;
        }

        function updateVideoSpeed() {
            showNotification('✓ تم تحديث سرعة الفيديو');
        }

        function updateVideoVolume() {
            showNotification('✓ تم تحديث مستوى الصوت');
        }

        function updateAudioVolume() {
            showNotification('✓ تم تحديث مستوى الصوت');
        }

        function updateAudioSpeed() {
            showNotification('✓ تم تحديث سرعة الصوت');
        }

        function switchTab(modal, tab) {
            document.querySelectorAll(`#${modal}-tab .tab-content`).forEach(el => el.classList.remove('active'));
            document.querySelectorAll(`#${modal}-tab .tab-btn`).forEach(el => el.classList.remove('active'));
            
            document.getElementById(tab + '-' + modal).classList.add('active');
            event.target.classList.add('active');
        }

        function startDrawing() {
            isDrawing = true;
            showNotification('✏️ ابدأ الرسم على الشاشة');
        }

        function clearDrawing() {
            showNotification('🗑️ تم مسح الرسم');
        }

        function applyCustomAnimation() {
            showNotification('✓ تم تطبيق الحركة المخصصة');
            hasUnsavedChanges = true;
        }

        function addToHistory() {
            historyIndex++;
            history = history.slice(0, historyIndex);
            history.push(saveState());
        }

        function saveState() {
            return {
                html: iframeDoc.body.innerHTML,
                timestamp: Date.now()
            };
        }

        function restoreState(state) {
            iframeDoc.body.innerHTML = state.html;
            setupEditor();
        }

        function undoChanges() {
            if (historyIndex > 0) {
                historyIndex--;
                restoreState(history[historyIndex]);
                showNotification('↶ تم التراجع');
            }
        }

        function redoChanges() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                restoreState(history[historyIndex]);
                showNotification('↷ تم الإعادة');
            }
        }

        function showTemplates() {
            const modal = document.getElementById('templates-modal');
            const list = document.getElementById('templates-list');
            
            if (templates.length === 0) {
                list.innerHTML = '<p style="color: #888; text-align: center; padding: 20px;">لا توجد نسخ محفوظة</p>';
            } else {
                list.innerHTML = templates.map(t => `
                    <div style="background: #0a0e27; padding: 10px; margin: 8px 0; border-radius: 4px; border-left: 3px solid #00ff88;">
                        <div style="color: #00ff88; font-weight: bold; margin-bottom: 4px;">${t.name}</div>
                        <div style="color: #888; font-size: 10px; margin-bottom: 8px;">${t.date}</div>
                        <div style="display: flex; gap: 4px;">
                            <button onclick="applyTemplate(${t.id})" style="flex: 1; padding: 4px; background: #00ff88; border: none; border-radius: 3px; cursor: pointer; color: #000; font-weight: bold; font-size: 10px;">تطبيق</button>
                            <button onclick="deleteTemplate(${t.id})" style="flex: 1; padding: 4px; background: #ff4d4d; border: none; border-radius: 3px; cursor: pointer; color: #fff; font-weight: bold; font-size: 10px;">حذف</button>
                        </div>
                    </div>
                `).join('');
            }

            modal.classList.add('show');
        }

        function loadTemplates() {
            const saved = localStorage.getItem('templates');
            if (saved) {
                templates = JSON.parse(saved);
            }
        }

        function applyTemplate(id) {
            const template = templates.find(t => t.id === id);
            if (template) {
                iframeDoc.body.innerHTML = template.html;
                setupEditor();
                addToHistory();
                showNotification('✓ تم تطبيق النسخة');
                closeModal('templates-modal');
            }
        }

        function deleteTemplate(id) {
            if (confirm('هل تريد حذف هذه النسخة؟')) {
                templates = templates.filter(t => t.id !== id);
                localStorage.setItem('templates', JSON.stringify(templates));
                showTemplates();
                showNotification('🗑️ تم حذف النسخة');
            }
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function saveChanges() {
            if (!hasUnsavedChanges) {
                showNotification('✅ لا توجد تغييرات');
                return;
            }

            const data = {
                html: iframeDoc.body.innerHTML,
                timestamp: new Date()
            };

            localStorage.setItem('editorData', JSON.stringify(data));
            hasUnsavedChanges = false;
            showNotification('💾 تم الحفظ بنجاح!');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }

        function updateElementCount() {
            const count = iframeDoc.querySelectorAll('[id]').length;
            document.getElementById('element-count').textContent = `العناصر: ${count}`;
        }

        function showNotification(msg) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }

        function exitEditor() {
            if (hasUnsavedChanges && !confirm('هناك تغييرات غير محفوظة. هل تريد الخروج؟')) return;
            window.location.href = 'admin.html';
        }
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes scale {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes flip {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</body>
</html>
