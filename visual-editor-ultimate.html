<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر التصميم الشامل المتقدم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #fff;
            direction: rtl;
            overflow: hidden;
        }

        .editor-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* الشريط العلوي */
        .editor-header {
            background: #1a1f3a;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00ff88;
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            color: #00ff88;
            font-weight: bold;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .device-switcher {
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 10px;
        }

        .device-btn {
            background: #0a0e27;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .device-btn.active {
            background: #00ff88;
            color: #000;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .header-btn:hover {
            background: #00dd77;
            transform: scale(1.05);
        }

        .header-btn.danger {
            background: #ff4d4d;
        }

        /* منطقة المعاينة */
        .preview-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
            overflow: hidden;
        }

        .preview-content {
            flex: 1;
            overflow: auto;
            position: relative;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .page-frame-container {
            transition: all 0.3s ease;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            background: #fff;
            transform-origin: top center;
        }

        .page-frame-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* لوحة الخصائص السفلية */
        .bottom-properties-panel {
            position: absolute;
            bottom: -400px;
            left: 0;
            right: 0;
            width: 100%;
            background: #1a1f3a;
            border-top: 2px solid #00ff88;
            padding: 20px;
            z-index: 1000;
            transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            max-height: 400px;
            overflow-y: auto;
        }

        .bottom-properties-panel.open {
            bottom: 0;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .panel-header h3 {
            color: #00ff88;
            font-size: 14px;
        }

        .close-panel-btn {
            background: #ff4d4d;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
        }

        .properties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .property-group {
            background: #0a0e27;
            padding: 12px;
            border-radius: 8px;
            border-left: 3px solid #00ff88;
        }

        .property-group label {
            display: block;
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
        }

        .property-group input,
        .property-group textarea {
            width: 100%;
            padding: 8px;
            background: #1a1f3a;
            border: 1px solid #333;
            color: #fff;
            border-radius: 5px;
            font-size: 11px;
        }

        /* طبقة التحديد */
        #selection-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 500;
            display: none;
        }

        .selection-box {
            position: absolute;
            border: 2px dashed #00ff88;
            background: rgba(0, 255, 136, 0.1);
            pointer-events: none;
            transition: all 0.1s ease;
        }

        /* أزرار التحكم السفلية */
        .bottom-toolbar {
            background: #0a0e27;
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            border-top: 1px solid #333;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }

        .toolbar-btn:hover {
            background: #00dd77;
            transform: scale(1.05);
        }

        .zoom-display {
            background: #1a1f3a;
            color: #00ff88;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            border: 1px solid #00ff88;
        }

        .mode-indicator {
            background: #1a1f3a;
            color: #00ff88;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            border: 1px solid #00ff88;
        }

        /* شريط التمرير المخصص */
        .bottom-properties-panel::-webkit-scrollbar {
            width: 8px;
        }

        .bottom-properties-panel::-webkit-scrollbar-track {
            background: #0a0e27;
        }

        .bottom-properties-panel::-webkit-scrollbar-thumb {
            background: #00ff88;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .editor-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .properties-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <!-- الشريط العلوي -->
        <div class="editor-header">
            <div class="header-title">
                <i class="fas fa-magic"></i> محرر التصميم الذكي
            </div>

            <div class="header-controls">
                <!-- أزرار تبديل الأجهزة -->
                <div class="device-switcher">
                    <button class="device-btn active" onclick="setDevice('pc', this)">
                        <i class="fas fa-desktop"></i> PC
                    </button>
                    <button class="device-btn" onclick="setDevice('phone', this)">
                        <i class="fas fa-mobile-alt"></i> Phone
                    </button>
                </div>

                <!-- أزرار التحكم -->
                <div class="header-buttons">
                    <button class="header-btn" onclick="togglePropertiesPanel()">
                        <i class="fas fa-sliders-h"></i> الخصائص
                    </button>
                    <button class="header-btn" onclick="saveChanges()">
                        <i class="fas fa-save"></i> حفظ
                    </button>
                    <button class="header-btn danger" onclick="window.location.href='admin.html'">
                        <i class="fas fa-times"></i> خروج
                    </button>
                </div>
            </div>
        </div>

        <!-- منطقة المعاينة -->
        <div class="preview-area">
            <div class="preview-content" id="preview-content">
                <div id="selection-overlay">
                    <div class="selection-box" id="selection-box"></div>
                </div>
                <div class="page-frame-container" id="page-frame-container" style="width: 100%; height: 100%;">
                    <iframe src="index.html" id="preview-iframe"></iframe>
                </div>
            </div>

            <!-- لوحة الخصائص السفلية -->
            <div class="bottom-properties-panel" id="properties-panel">
                <div class="panel-header">
                    <h3><i class="fas fa-edit"></i> خصائص العنصر</h3>
                    <button class="close-panel-btn" onclick="togglePropertiesPanel()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>

                <div class="properties-grid" id="properties-content">
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #666;">
                        <i class="fas fa-mouse-pointer fa-3x" style="margin-bottom: 15px; opacity: 0.3;"></i>
                        <p>قم بالضغط على أي عنصر في الصفحة لتعديل خصائصه</p>
                    </div>
                </div>
            </div>

            <!-- شريط التحكم السفلي -->
            <div class="bottom-toolbar">
                <button class="toolbar-btn" onclick="adjustZoom(-0.1)">
                    <i class="fas fa-minus"></i> تصغير
                </button>
                <div class="zoom-display" id="zoom-display">100%</div>
                <button class="toolbar-btn" onclick="adjustZoom(0.1)">
                    <i class="fas fa-plus"></i> تكبير
                </button>
                <button class="toolbar-btn" onclick="resetZoom()">
                    <i class="fas fa-redo"></i> إعادة تعيين
                </button>
                <div style="width: 1px; background: #333;"></div>
                <div class="mode-indicator" id="mode-indicator">
                    <i class="fas fa-mouse-pointer"></i> وضع التحديد
                </div>
                <button class="toolbar-btn" onclick="toggleMode()">
                    <i class="fas fa-eye"></i> تبديل الوضع
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentZoom = 1;
        let currentMode = 'select';
        let selectedElement = null;
        const iframe = document.getElementById('preview-iframe');
        const frameContainer = document.getElementById('page-frame-container');
        const selectionOverlay = document.getElementById('selection-overlay');
        const selectionBox = document.getElementById('selection-box');
        const propertiesPanel = document.getElementById('properties-panel');

        // تبديل لوحة الخصائص
        function togglePropertiesPanel() {
            propertiesPanel.classList.toggle('open');
        }

        // تعيين الجهاز
        function setDevice(device, btn) {
            document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (device === 'phone') {
                frameContainer.style.width = '375px';
                frameContainer.style.height = '667px';
                frameContainer.style.borderRadius = '30px';
                frameContainer.style.border = '10px solid #333';
            } else {
                frameContainer.style.width = '100%';
                frameContainer.style.height = '100%';
                frameContainer.style.borderRadius = '0';
                frameContainer.style.border = 'none';
            }
            updateSelectionBox();
        }

        // التحكم في التكبير
        function adjustZoom(delta) {
            currentZoom = Math.max(0.5, Math.min(2, currentZoom + delta));
            updateZoom();
        }

        function resetZoom() {
            currentZoom = 1;
            updateZoom();
        }

        function updateZoom() {
            frameContainer.style.transform = `scale(${currentZoom})`;
            document.getElementById('zoom-display').innerText = Math.round(currentZoom * 100) + '%';
            updateSelectionBox();
        }

        // تبديل الأوضاع
        function toggleMode() {
            currentMode = currentMode === 'select' ? 'preview' : 'select';
            updateMode();
        }

        function updateMode() {
            const indicator = document.getElementById('mode-indicator');
            if (currentMode === 'select') {
                selectionOverlay.style.display = 'block';
                iframe.style.pointerEvents = 'none';
                indicator.innerHTML = '<i class="fas fa-mouse-pointer"></i> وضع التحديد';
            } else {
                selectionOverlay.style.display = 'none';
                iframe.style.pointerEvents = 'auto';
                selectedElement = null;
                indicator.innerHTML = '<i class="fas fa-eye"></i> وضع العرض';
                document.getElementById('properties-content').innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 20px; color: #666;"><p>وضع العرض مفعل</p></div>';
            }
        }

        // منطق التحديد والتعديل
        iframe.onload = function() {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            
            document.getElementById('preview-content').addEventListener('mousemove', (e) => {
                if (currentMode !== 'select') return;
                
                const rect = iframe.getBoundingClientRect();
                const x = (e.clientX - rect.left) / currentZoom;
                const y = (e.clientY - rect.top) / currentZoom;
                
                const el = doc.elementFromPoint(x, y);
                if (el && el !== doc.body && el !== doc.documentElement) {
                    highlightElement(el);
                }
            });

            document.getElementById('preview-content').addEventListener('click', (e) => {
                if (currentMode !== 'select') return;
                
                const rect = iframe.getBoundingClientRect();
                const x = (e.clientX - rect.left) / currentZoom;
                const y = (e.clientY - rect.top) / currentZoom;
                
                const el = doc.elementFromPoint(x, y);
                if (el && el !== doc.body && el !== doc.documentElement) {
                    selectElement(el);
                }
            });
        };

        function highlightElement(el) {
            const rect = el.getBoundingClientRect();
            
            selectionBox.style.width = rect.width + 'px';
            selectionBox.style.height = rect.height + 'px';
            selectionBox.style.left = (rect.left * currentZoom) + 'px';
            selectionBox.style.top = (rect.top * currentZoom) + 'px';
            selectionOverlay.style.display = 'block';
        }

        function selectElement(el) {
            selectedElement = el;
            const content = document.getElementById('properties-content');
            
            let html = `
                <div class="property-group">
                    <label>نوع العنصر</label>
                    <input type="text" value="${el.tagName}" readonly>
                </div>
            `;

            if (el.innerText && el.children.length === 0) {
                html += `
                    <div class="property-group" style="grid-column: 1/-1;">
                        <label>النص</label>
                        <textarea oninput="updateText(this.value)" style="height: 60px;">${el.innerText}</textarea>
                    </div>
                `;
            }

            html += `
                <div class="property-group">
                    <label>لون النص</label>
                    <input type="color" value="${rgbToHex(window.getComputedStyle(el).color)}" oninput="updateStyle('color', this.value)">
                </div>
                <div class="property-group">
                    <label>حجم الخط (px)</label>
                    <input type="number" value="${parseInt(window.getComputedStyle(el).fontSize)}" oninput="updateStyle('fontSize', this.value + 'px')">
                </div>
            `;

            content.innerHTML = html;
            propertiesPanel.classList.add('open');
        }

        function updateText(val) {
            if (selectedElement) selectedElement.innerText = val;
        }

        function updateStyle(prop, val) {
            if (selectedElement) selectedElement.style[prop] = val;
        }

        function rgbToHex(rgb) {
            if (!rgb) return '#000000';
            const res = rgb.match(/\d+/g);
            if (!res) return '#000000';
            return "#" + res.slice(0,3).map(x => {
                const hex = parseInt(x).toString(16);
                return hex.length === 1 ? "0" + hex : hex;
            }).join("");
        }

        function updateSelectionBox() {
            if (selectedElement) highlightElement(selectedElement);
        }

        function saveChanges() {
            alert("تم حفظ التعديلات بنجاح!");
        }

        // تفعيل وضع التحديد افتراضياً
        updateMode();
    </script>
</body>
</html>
