<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="موقع شخصي احترافي">
    <meta name="google-site-verification" content="zeiox0.github.io">
    
    <link rel="canonical" href="https://zeiox0.github.io">
    
    <title>Abdallah | Official</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- شاشة الدخول الزجاجية -->
    <div id="enter-screen" class="enter-screen">
        <div class="enter-content glass">
            <h1>Abdallah | Official</h1>
            <p>اضغط Enter للدخول</p>
            <button id="enter-btn" class="enter-btn">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="main-content" style="display: none;">
        <!-- فيديو الخلفية -->
        <video id="bg-video" loop playsinline muted preload="auto">
            <source id="video-src" src="test-video.mp4" type="video/mp4">
            متصفحك لا يدعم عنصر الفيديو
        </video>
        
        <!-- معلومات الملف الشخصي -->
        <div class="profile-info">
            <h1 id="user-name">Zeiox</h1>
            <p id="user-bio">Hi I 👋</p>
            
            <!-- أيقونات التواصل الاجتماعي -->
            <div id="social-links" class="social-links"></div>
            
            <!-- قسم التطبيقات المتصلة -->
            <div id="connected-apps" class="connected-apps"></div>
        </div>
        
        <!-- صوت الخلفية -->
        <audio id="bg-music" loop preload="auto">
            <source id="audio-src" src="" type="audio/mpeg">
        </audio>
        
        <!-- أدوات التحكم -->
        <div id="main-toolbar" class="media-controls">
            <div class="control-group">
                <button id="video-toggle" class="control-btn" title="تشغيل/إيقاف الفيديو">
                    <i class="fas fa-video"></i>
                </button>
            </div>
            
            <div class="control-group">
                <button id="audio-toggle" class="control-btn" title="تشغيل/إيقاف الصوت">
                    <i class="fas fa-volume-up"></i>
                </button>
                <input type="range" id="audio-volume" class="control-slider" min="0" max="100" value="50" title="مستوى الصوت">
            </div>
            
            <div class="control-group">
                <button id="dev-mode-btn" class="control-btn" title="وضع المطور">
                    <i class="fas fa-code"></i>
                </button>
                <button id="toolbar-toggle-btn" class="control-btn" title="إظهار/إخفاء الشريط">
                    <i class="fas fa-chevron-down"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- نافذة وضع المطور (Developer Mode) -->
    <div id="dev-mode-modal" class="modal" style="display: none;">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>وضع المطور</h2>
                <button class="close-btn" id="close-dev-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="dev-section">
                    <h3>إضافة تطبيق جديد</h3>
                    <div class="form-group">
                        <label>اسم التطبيق:</label>
                        <input type="text" id="app-name" placeholder="مثال: GitHub">
                    </div>
                    <div class="form-group">
                        <label>رابط التطبيق:</label>
                        <input type="url" id="app-url" placeholder="https://example.com">
                    </div>
                    <div class="form-group">
                        <label>أيقونة (Font Awesome):</label>
                        <input type="text" id="app-icon" placeholder="fab fa-github">
                    </div>
                    <button id="add-app-btn" class="btn-primary">إضافة التطبيق</button>
                </div>
                
                <div class="dev-section">
                    <h3>التطبيقات المضافة</h3>
                    <div id="apps-list" class="apps-list"></div>
                </div>
                
                <div class="dev-section">
                    <h3>حسابات ديسكورد المتصلة</h3>
                    <div id="discord-accounts" class="discord-accounts"></div>
                    <button id="add-discord-btn" class="btn-primary">إضافة حساب ديسكورد</button>
                </div>
            </div>
        </div>
    </div>

    <!-- زر الإظهار العائم -->
    <div id="floating-toolbar-show" onclick="toggleToolbar(true)">
        <i class="fas fa-chevron-up"></i>
    </div>

    <!-- Firebase Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    
    <!-- Config و Security -->
    <script src="config.js"></script>
    <script src="security.js"></script>
    
    <!-- Main Script -->
    <script>
        let videoPlaying = true;
        let audioPlaying = true;
        const videoElement = document.getElementById('bg-video');
        const audioElement = document.getElementById('bg-music');
        const mainContent = document.getElementById('main-content');
        const enterScreen = document.getElementById('enter-screen');
        const enterBtn = document.getElementById('enter-btn');
        
        // تخزين البيانات محلياً للتطبيقات وديسكورد فقط
        let appData = {
            apps: [],
            discordAccounts: []
        };
        
        // تحميل البيانات من localStorage
        function loadLocalData() {
            const saved = localStorage.getItem('profilePortalData');
            if (saved) {
                appData = JSON.parse(saved);
            }
        }
        
        // حفظ البيانات في localStorage
        function saveLocalData() {
            localStorage.setItem('profilePortalData', JSON.stringify(appData));
        }
        
        // عند الضغط على زر الدخول أو مفتاح Enter
        function enterSite() {
            enterScreen.style.opacity = '0';
            enterScreen.style.pointerEvents = 'none';
            setTimeout(() => {
                enterScreen.style.display = 'none';
                mainContent.style.display = 'block';
                
                // تشغيل الميديا بعد تفاعل المستخدم
                videoElement.play().catch(e => console.error('Video error:', e));
                audioElement.play().catch(e => console.error('Audio error:', e));
                
                // تحميل البيانات المحفوظة
                loadLocalData();
                renderApps();
                renderDiscordAccounts();
            }, 500);
        }
        
        enterBtn.addEventListener('click', enterSite);
        
        // الاستماع لمفتاح Enter
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && enterScreen.style.display !== 'none') {
                enterSite();
            }
        });
        
        // جلب البيانات من Firebase - بدون تغيير
        try {
            db.collection('siteData').doc('config').onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('user-name').innerText = data.name || "Zeiox";
                    document.getElementById('user-bio').innerText = data.bio || "Hi I 👋";
                    
                    // تحديث الفيديو
                    if(data.video && videoElement.src !== data.video) {
                        videoElement.src = data.video;
                        videoElement.load();
                        if (mainContent.style.display !== 'none') {
                            videoElement.play().catch(e => console.log('Autoplay blocked:', e));
                        }
                    }
                    
                    // تحديث الصوت
                    if(data.audio && audioElement.src !== data.audio) {
                        audioElement.src = data.audio;
                        audioElement.load();
                        if (mainContent.style.display !== 'none') {
                            audioElement.play().catch(e => console.log('Audio blocked:', e));
                        }
                    }
                    
                    // تحديث الأيقونات الاجتماعية
                    if(data.socialLinks) {
                        const socialLinksDiv = document.getElementById('social-links');
                        socialLinksDiv.innerHTML = '';
                        
                        data.socialLinks.forEach(link => {
                            const a = document.createElement('a');
                            a.href = link.url;
                            a.target = '_blank';
                            a.rel = 'noopener noreferrer';
                            a.title = link.name;
                            a.innerHTML = `<i class="${link.icon}"></i>`;
                            socialLinksDiv.appendChild(a);
                        });
                    }
                }
            });
        } catch (error) {
            console.log('Firebase connection error:', error);
        }

        // التحكم في الفيديو
        document.getElementById('video-toggle').addEventListener('click', function() {
            if (videoPlaying) {
                videoElement.pause();
                this.innerHTML = '<i class="fas fa-video-slash"></i>';
                this.style.opacity = '0.5';
            } else {
                videoElement.play().catch(e => console.error('Play error:', e));
                this.innerHTML = '<i class="fas fa-video"></i>';
                this.style.opacity = '1';
            }
            videoPlaying = !videoPlaying;
        });

        // التحكم في الصوت
        document.getElementById('audio-toggle').addEventListener('click', function() {
            if (audioPlaying) {
                audioElement.pause();
                this.innerHTML = '<i class="fas fa-volume-mute"></i>';
                this.style.opacity = '0.5';
            } else {
                audioElement.play().catch(e => console.error('Play error:', e));
                this.innerHTML = '<i class="fas fa-volume-up"></i>';
                this.style.opacity = '1';
            }
            audioPlaying = !audioPlaying;
        });

        // التحكم في مستوى الصوت
        document.getElementById('audio-volume').addEventListener('input', function(e) {
            audioElement.volume = e.target.value / 100;
        });
        
        // وضع المطور
        document.getElementById('dev-mode-btn').addEventListener('click', function() {
            const modal = document.getElementById('dev-mode-modal');
            modal.style.display = modal.style.display === 'none' ? 'flex' : 'none';
        });
        
        // إغلاق نافذة وضع المطور
        document.getElementById('close-dev-modal').addEventListener('click', function() {
            document.getElementById('dev-mode-modal').style.display = 'none';
        });

        // التحكم في إظهار وإخفاء شريط الأدوات
        const mainToolbar = document.getElementById('main-toolbar');
        const floatingShowBtn = document.getElementById('floating-toolbar-show');
        const toolbarToggleBtn = document.getElementById('toolbar-toggle-btn');

        function toggleToolbar(show) {
            if (show) {
                mainToolbar.classList.remove('hidden');
                floatingShowBtn.classList.remove('visible');
                setTimeout(() => {
                    floatingShowBtn.style.display = 'none';
                }, 500);
            } else {
                mainToolbar.classList.add('hidden');
                floatingShowBtn.style.display = 'flex';
                setTimeout(() => {
                    floatingShowBtn.classList.add('visible');
                }, 10);
            }
        }

        if (toolbarToggleBtn) {
            toolbarToggleBtn.addEventListener('click', function() {
                toggleToolbar(false);
            });
        }
        
        // إضافة تطبيق جديد
        document.getElementById('add-app-btn').addEventListener('click', function() {
            const name = document.getElementById('app-name').value.trim();
            const url = document.getElementById('app-url').value.trim();
            const icon = document.getElementById('app-icon').value.trim();
            
            if (name && url && icon) {
                appData.apps.push({ name, url, icon });
                saveLocalData();
                renderApps();
                
                // مسح الحقول
                document.getElementById('app-name').value = '';
                document.getElementById('app-url').value = '';
                document.getElementById('app-icon').value = '';
                
                alert('تم إضافة التطبيق بنجاح!');
            } else {
                alert('يرجى ملء جميع الحقول');
            }
        });
        
        // عرض التطبيقات المضافة
        function renderApps() {
            const appsList = document.getElementById('apps-list');
            const connectedApps = document.getElementById('connected-apps');
            
            appsList.innerHTML = '';
            connectedApps.innerHTML = '';
            
            if (appData.apps.length === 0) {
                appsList.innerHTML = '<p class="empty-state">لم يتم إضافة أي تطبيقات بعد</p>';
                return;
            }
            
            appData.apps.forEach((app, index) => {
                // في قائمة وضع المطور
                const appItem = document.createElement('div');
                appItem.className = 'app-item';
                appItem.innerHTML = `
                    <div class="app-info">
                        <i class="${app.icon}"></i>
                        <div>
                            <h4>${app.name}</h4>
                            <p>${app.url}</p>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteApp(${index})">حذف</button>
                `;
                appsList.appendChild(appItem);
                
                // في الملف الشخصي الرئيسي
                const connectedApp = document.createElement('a');
                connectedApp.href = app.url;
                connectedApp.target = '_blank';
                connectedApp.rel = 'noopener noreferrer';
                connectedApp.className = 'connected-app';
                connectedApp.title = app.name;
                connectedApp.innerHTML = `<i class="${app.icon}"></i>`;
                connectedApps.appendChild(connectedApp);
            });
        }
        
        // حذف تطبيق
        window.deleteApp = function(index) {
            if (confirm('هل تريد حذف هذا التطبيق؟')) {
                appData.apps.splice(index, 1);
                saveLocalData();
                renderApps();
            }
        };
        
        // ربط ديسكورد
        document.getElementById('add-discord-btn').addEventListener('click', function() {
            const discordUsername = prompt('أدخل اسم ديسكورد الخاص بك (بدون #):');
            if (discordUsername) {
                const discordId = prompt('أدخل معرف ديسكورد الخاص بك (ID):');
                if (discordId) {
                    appData.discordAccounts.push({
                        username: discordUsername,
                        id: discordId,
                        addedAt: new Date().toLocaleString('ar-SA')
                    });
                    saveLocalData();
                    renderDiscordAccounts();
                    alert('تم ربط حساب ديسكورد بنجاح!');
                }
            }
        });
        
        // عرض حسابات ديسكورد
        function renderDiscordAccounts() {
            const discordAccounts = document.getElementById('discord-accounts');
            
            discordAccounts.innerHTML = '';
            
            if (appData.discordAccounts.length === 0) {
                discordAccounts.innerHTML = '<p class="empty-state">لم يتم ربط أي حسابات ديسكورد بعد</p>';
                return;
            }
            
            appData.discordAccounts.forEach((account, index) => {
                const accountItem = document.createElement('div');
                accountItem.className = 'discord-account-item';
                accountItem.innerHTML = `
                    <div class="account-info">
                        <i class="fab fa-discord"></i>
                        <div>
                            <h4>${account.username}</h4>
                            <p>ID: ${account.id}</p>
                            <small>${account.addedAt}</small>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteDiscordAccount(${index})">حذف</button>
                `;
                discordAccounts.appendChild(accountItem);
            });
        }
        
        // حذف حساب ديسكورد
        window.deleteDiscordAccount = function(index) {
            if (confirm('هل تريد حذف هذا الحساب؟')) {
                appData.discordAccounts.splice(index, 1);
                saveLocalData();
                renderDiscordAccounts();
            }
        };
        
        // إغلاق النافذة عند الضغط خارجها
        document.getElementById('dev-mode-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.style.display = 'none';
            }
        });
    </script>
</body>
</html>
